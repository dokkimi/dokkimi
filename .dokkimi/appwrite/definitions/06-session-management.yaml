name: appwrite-session-management
description: >
  Test session lifecycle: revocation, token replay after deletion, concurrent
  sessions, and cross-project session isolation.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/appwrite-mariadb.yaml
  - $ref: ../shared/appwrite-redis.yaml
  - $ref: ../shared/appwrite-worker-db.yaml
  - $ref: ../shared/appwrite-api.yaml
variables:
  adminEmail: admin@dokkimi.test
  adminPassword: TestPass123!
  projectId: session-test
  userEmail: sessionuser@dokkimi.test
  userPassword: SessionPass123!
tests:
  - name: Session lifecycle and security
    steps:
      # --- Setup ---
      - name: Register admin
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            userId: 'unique()'
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
            name: Admin
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Admin session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
        extract:
          fallbackCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create team
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/teams
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            teamId: 'unique()'
            name: Session Test Org
        extract:
          teamId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectId}}'
            name: Session Test
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Register test user
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
          body:
            userId: 'unique()'
            email: '{{userEmail}}'
            password: '{{userPassword}}'
            name: Session User
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Test 1: Session revocation ---

      - name: Create session 1
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
          body:
            email: '{{userEmail}}'
            password: '{{userPassword}}'
        extract:
          session1Cookies: $.response.headers.x-fallback-cookies
          session1Id: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Session 1 can access account
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/account
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{session1Cookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.email
                operator: eq
                value: '{{userEmail}}'

      - name: Delete session 1
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/account/sessions/{{session1Id}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{session1Cookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 204

      - name: Revoked session 1 token is rejected
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/account
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{session1Cookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      # --- Test 2: Concurrent sessions ---

      - name: Create session A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
          body:
            email: '{{userEmail}}'
            password: '{{userPassword}}'
        extract:
          sessionACookies: $.response.headers.x-fallback-cookies
          sessionAId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create session B
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
          body:
            email: '{{userEmail}}'
            password: '{{userPassword}}'
        extract:
          sessionBCookies: $.response.headers.x-fallback-cookies
          sessionBId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Both sessions are active
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/account/sessions
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{sessionACookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.total
                operator: gte
                value: 2

      - name: Delete session A only
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/account/sessions/{{sessionAId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{sessionACookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 204

      - name: Session A is rejected after deletion
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/account
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{sessionACookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      - name: Session B still works after A was deleted
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/account
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{sessionBCookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.email
                operator: eq
                value: '{{userEmail}}'

      # --- Test 3: Delete all sessions ---

      - name: Create session C (fresh for bulk delete test)
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
          body:
            email: '{{userEmail}}'
            password: '{{userPassword}}'
        extract:
          sessionCCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Delete all sessions
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/account/sessions
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{sessionCCookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 204

      - name: Session B rejected after bulk delete
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/account
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{sessionBCookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      - name: Session C rejected after bulk delete
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/account
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{sessionCCookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      # --- Test 4: Cross-project session isolation ---

      - name: Create second project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: session-test-2
            name: Session Test 2
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Register same email in second project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: session-test-2
          body:
            userId: 'unique()'
            email: '{{userEmail}}'
            password: '{{userPassword}}'
            name: Session User
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Login in project 1
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
          body:
            email: '{{userEmail}}'
            password: '{{userPassword}}'
        extract:
          proj1Cookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: 'Project 1 session CANNOT access project 2'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/account
          headers:
            X-Appwrite-Project: session-test-2
            X-Fallback-Cookies: '{{proj1Cookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401
