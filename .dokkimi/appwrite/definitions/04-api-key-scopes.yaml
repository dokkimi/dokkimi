name: appwrite-api-key-scopes
description: >
  Test API key scope enforcement. Create keys with limited scopes and verify
  that out-of-scope operations are rejected.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/appwrite-mariadb.yaml
  - $ref: ../shared/appwrite-redis.yaml
  - $ref: ../shared/appwrite-worker-db.yaml
  - $ref: ../shared/appwrite-api.yaml
variables:
  adminEmail: admin@dokkimi.test
  adminPassword: TestPass123!
  projectId: scope-test
tests:
  - name: API key scope enforcement
    steps:
      # --- Setup ---
      - name: Register admin
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            userId: 'unique()'
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
            name: Admin
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Admin session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
        extract:
          fallbackCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create team
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/teams
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            teamId: 'unique()'
            name: Scope Test Org
        extract:
          teamId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectId}}'
            name: Scope Test
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Create keys with different scopes ---

      - name: Create read-only users key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectId}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Users Read Only
            scopes:
              - users.read
        extract:
          usersReadKey: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create databases-only key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectId}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Databases Only
            scopes:
              - databases.read
              - databases.write
        extract:
          dbOnlyKey: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create full key for setup
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectId}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Full Key
            scopes:
              - users.read
              - users.write
              - databases.read
              - databases.write
              - collections.read
              - collections.write
              - documents.read
              - documents.write
              - health.read
        extract:
          fullKey: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Setup test data with full key ---

      - name: Create database with full key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{fullKey}}'
          body:
            databaseId: scope-db
            name: Scope Test DB
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create user with full key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/users
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{fullKey}}'
          body:
            userId: 'unique()'
            email: testuser@dokkimi.test
            password: TestPass123!
            name: Test User
        extract:
          testUserId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Test users.read key ---

      - name: 'users.read key CAN list users'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{usersReadKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.total
                operator: gte
                value: 1

      - name: 'users.read key CANNOT create users'
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/users
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{usersReadKey}}'
          body:
            userId: 'unique()'
            email: blocked@dokkimi.test
            password: TestPass123!
            name: Should Fail
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      - name: 'users.read key CANNOT delete users'
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/users/{{testUserId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{usersReadKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      - name: 'users.read key CANNOT list databases'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{usersReadKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      # NOTE: /v1/health is accessible with any valid API key regardless of scopes.
      # This appears intentional — basic health checks don't require health.read scope.
      - name: 'users.read key CAN read health (no scope enforcement on health endpoint)'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/health
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{usersReadKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      # --- Test databases-only key ---

      - name: 'databases key CAN list databases'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{dbOnlyKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.total
                operator: eq
                value: 1

      - name: 'databases key CAN create databases'
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{dbOnlyKey}}'
          body:
            databaseId: scope-db-2
            name: Second DB
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: 'databases key CANNOT list users'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{dbOnlyKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      - name: 'databases key CANNOT read collections (no collections.read scope)'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/scope-db/collections
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{dbOnlyKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      # --- Test invalid/empty key ---

      - name: 'Invalid API key is rejected'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: 'totally-fake-key-that-doesnt-exist'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      - name: 'No API key or session is rejected'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users
          headers:
            X-Appwrite-Project: '{{projectId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      # --- Verify test user still exists (delete attempts failed) ---

      - name: Test user survived unauthorized delete attempt
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users/{{testUserId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{fullKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.email
                operator: eq
                value: testuser@dokkimi.test
