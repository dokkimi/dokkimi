name: appwrite-file-content-integrity
description: >
  Verify file upload/download integrity: content roundtrip, empty files,
  files near size limit, and duplicate filenames persisting independently.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/appwrite-mariadb.yaml
  - $ref: ../shared/appwrite-redis.yaml
  - $ref: ../shared/appwrite-worker-db.yaml
  - $ref: ../shared/appwrite-api.yaml
variables:
  adminEmail: admin@dokkimi.test
  adminPassword: TestPass123!
  projectId: file-integrity
tests:
  - name: File content integrity
    steps:
      # --- Setup ---
      - name: Register admin
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            userId: 'unique()'
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
            name: Admin
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Admin session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
        extract:
          fallbackCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create team
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/teams
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            teamId: 'unique()'
            name: File Integrity Org
        extract:
          teamId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectId}}'
            name: File Integrity Test
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create API key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectId}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Full Key
            scopes:
              - buckets.read
              - buckets.write
              - files.read
              - files.write
        extract:
          apiKey: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Create bucket ---

      - name: Create bucket
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/storage/buckets
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            bucketId: integrity-bucket
            name: Integrity Test Bucket
            maximumFileSize: 1048576
            permissions:
              - 'read("any")'
              - 'create("any")'
              - 'update("any")'
              - 'delete("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Upload file with known content ---

      - name: Upload text file
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/storage/buckets/integrity-bucket/files
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          formData:
            fileId: 'unique()'
            file:
              filename: hello.txt
              content: 'Hello from Dokkimi integrity test!'
              contentType: text/plain
            permissions:
              - 'read("any")'
        extract:
          textFileId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201
              - path: $.response.body.name
                operator: eq
                value: hello.txt

      - name: Verify file metadata
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/integrity-bucket/files/{{textFileId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.name
                operator: eq
                value: hello.txt
              - path: $.response.body.sizeOriginal
                operator: gt
                value: 0

      - name: Download file and verify content
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/integrity-bucket/files/{{textFileId}}/download
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      # --- Upload empty file ---

      - name: Upload empty file
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/storage/buckets/integrity-bucket/files
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          formData:
            fileId: 'unique()'
            file:
              filename: empty.txt
              content: ''
              contentType: text/plain
            permissions:
              - 'read("any")'
        extract:
          emptyFileId: $.response.body.$id
          emptyFileStatus: $.response.status

      - name: Verify empty file handling
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/integrity-bucket/files
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        extract:
          fileCountAfterEmpty: $.response.body.total
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      # --- Upload JSON file ---

      - name: Upload JSON file
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/storage/buckets/integrity-bucket/files
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          formData:
            fileId: 'unique()'
            file:
              filename: config.json
              content: '{"key": "value", "nested": {"a": 1}}'
              contentType: application/json
            permissions:
              - 'read("any")'
        extract:
          jsonFileId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201
              - path: $.response.body.name
                operator: eq
                value: config.json

      - name: Download JSON file
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/integrity-bucket/files/{{jsonFileId}}/download
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      # --- Duplicate filenames should persist independently ---

      - name: Upload duplicate filename (different content)
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/storage/buckets/integrity-bucket/files
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          formData:
            fileId: 'unique()'
            file:
              filename: hello.txt
              content: 'Different content, same filename!'
              contentType: text/plain
            permissions:
              - 'read("any")'
        extract:
          dupFileId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Both files exist independently
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/integrity-bucket/files
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.total
                operator: gte
                value: 3

      - name: Original file still has correct metadata
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/integrity-bucket/files/{{textFileId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.name
                operator: eq
                value: hello.txt

      - name: Duplicate file has different ID
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/integrity-bucket/files/{{dupFileId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.name
                operator: eq
                value: hello.txt
              - path: $.response.body.$id
                operator: ne
                value: '{{textFileId}}'
