name: appwrite-file-storage
description: >
  Test file storage: upload via formData, download, permission enforcement,
  and cross-user file access denial.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/appwrite-mariadb.yaml
  - $ref: ../shared/appwrite-redis.yaml
  - $ref: ../shared/appwrite-worker-db.yaml
  - $ref: ../shared/appwrite-api.yaml
variables:
  adminEmail: admin@dokkimi.test
  adminPassword: TestPass123!
  projectId: storage-test
  userAEmail: alice@dokkimi.test
  userAPassword: AlicePass123!
  userBEmail: bob@dokkimi.test
  userBPassword: BobPass123!
tests:
  - name: File storage and permissions
    steps:
      # --- Setup admin + project ---
      - name: Register admin
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            userId: 'unique()'
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
            name: Admin
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Admin session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
        extract:
          fallbackCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create team
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/teams
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            teamId: 'unique()'
            name: Storage Test Org
        extract:
          teamId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectId}}'
            name: Storage Test
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create API key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectId}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Full Key
            scopes:
              - users.read
              - users.write
              - buckets.read
              - buckets.write
              - files.read
              - files.write
        extract:
          apiKey: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Create storage bucket ---

      - name: Create bucket with file-level security
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/storage/buckets
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            bucketId: private-files
            name: Private Files
            maximumFileSize: 1048576
            fileSecurity: true
            permissions:
              - 'create("users")'
            allowedFileExtensions:
              - txt
              - json
              - png
        extract:
          bucketId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Register two users ---

      - name: Register Alice
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
          body:
            userId: 'unique()'
            email: '{{userAEmail}}'
            password: '{{userAPassword}}'
            name: Alice
        extract:
          aliceId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Alice session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
          body:
            email: '{{userAEmail}}'
            password: '{{userAPassword}}'
        extract:
          aliceCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Register Bob
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
          body:
            userId: 'unique()'
            email: '{{userBEmail}}'
            password: '{{userBPassword}}'
            name: Bob
        extract:
          bobId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Bob session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
          body:
            email: '{{userBEmail}}'
            password: '{{userBPassword}}'
        extract:
          bobCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Alice uploads a private file ---

      - name: Alice uploads private file
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/storage/buckets/{{bucketId}}/files
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{aliceCookies}}'
          formData:
            fileId: 'unique()'
            file:
              filename: secret.txt
              content: 'Alice secret data that Bob should not see'
              contentType: text/plain
            permissions:
              - 'read("user:{{aliceId}}")'
              - 'write("user:{{aliceId}}")'
        extract:
          aliceFileId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Alice can read her own file ---

      - name: Alice can view file metadata
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/{{bucketId}}/files/{{aliceFileId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{aliceCookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.name
                operator: eq
                value: secret.txt

      - name: Alice can download her file
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/{{bucketId}}/files/{{aliceFileId}}/download
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{aliceCookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      # --- Bob CANNOT access Alice's file ---

      - name: Bob CANNOT view Alice file metadata
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/{{bucketId}}/files/{{aliceFileId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{bobCookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 404

      - name: Bob CANNOT download Alice file
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/{{bucketId}}/files/{{aliceFileId}}/download
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{bobCookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 404

      - name: Bob CANNOT delete Alice file
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/storage/buckets/{{bucketId}}/files/{{aliceFileId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{bobCookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      # --- Unauthenticated access ---

      - name: Unauthenticated CANNOT download Alice file
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/{{bucketId}}/files/{{aliceFileId}}/download
          headers:
            X-Appwrite-Project: '{{projectId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 404

      # --- Public file ---

      - name: Alice uploads public file
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/storage/buckets/{{bucketId}}/files
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{aliceCookies}}'
          formData:
            fileId: 'unique()'
            file:
              filename: public.txt
              content: 'This is public data'
              contentType: text/plain
            permissions:
              - 'read("any")'
              - 'write("user:{{aliceId}}")'
        extract:
          publicFileId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Bob CAN download public file
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/{{bucketId}}/files/{{publicFileId}}/download
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{bobCookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      - name: Bob CANNOT delete public file (write restricted to Alice)
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/storage/buckets/{{bucketId}}/files/{{publicFileId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{bobCookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      # --- File extension enforcement ---

      - name: Disallowed file extension is rejected
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/storage/buckets/{{bucketId}}/files
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{aliceCookies}}'
          formData:
            fileId: 'unique()'
            file:
              filename: malware.exe
              content: 'pretend this is an executable'
              contentType: application/octet-stream
            permissions:
              - 'read("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 400

      # --- Verify Alice's private file survived all attacks ---

      - name: Alice private file still exists
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/storage/buckets/{{bucketId}}/files/{{aliceFileId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Fallback-Cookies: '{{aliceCookies}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.name
                operator: eq
                value: secret.txt
