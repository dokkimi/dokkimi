name: appwrite-api-db-consistency
description: >
  Verify API responses match actual MariaDB state. Uses dbQuery to inspect
  the database directly after CRUD operations — catches API/DB divergence
  that black-box testing cannot detect.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/appwrite-mariadb.yaml
  - $ref: ../shared/appwrite-redis.yaml
  - $ref: ../shared/appwrite-worker-db.yaml
  - $ref: ../shared/appwrite-api.yaml
variables:
  adminEmail: admin@dokkimi.test
  adminPassword: TestPass123!
  projectId: db-consistency
tests:
  - name: API vs database state
    steps:
      # --- Setup ---
      - name: Register admin
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            userId: 'unique()'
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
            name: Admin
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Admin session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
        extract:
          fallbackCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create team
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/teams
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            teamId: 'unique()'
            name: DB Test Org
        extract:
          teamId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectId}}'
            name: DB Consistency Test
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create API key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectId}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Full Key
            scopes:
              - users.read
              - users.write
              - databases.read
              - databases.write
              - collections.read
              - collections.write
              - documents.read
              - documents.write
        extract:
          apiKey: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Create database + collection + attribute ---

      - name: Create database
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            databaseId: consist-db
            name: Consistency DB
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create collection
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/consist-db/collections
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            collectionId: notes
            name: Notes
            permissions:
              - 'read("any")'
              - 'create("any")'
              - 'update("any")'
              - 'delete("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create string attribute
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/consist-db/collections/notes/attributes/string
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            key: content
            size: 256
            required: false
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [201, 202]

      - name: Wait for attribute
        repeat:
          count: 15
          as: attempt
          delayMs: 2000
          until:
            - path: $.response.body.status
              operator: eq
              value: available
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/consist-db/collections/notes/attributes/content
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'

      # --- Verify attribute exists as a real MariaDB column ---

      - name: Verify attribute column in MariaDB
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: "SELECT COUNT(*) as cnt FROM information_schema.columns WHERE table_schema = 'appwrite' AND column_name = 'content'"
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].cnt
                operator: gte
                value: 1

      # --- Create document and verify in MariaDB ---

      - name: Find document table name
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: "SELECT table_name FROM information_schema.columns WHERE table_schema = 'appwrite' AND column_name = 'content' AND table_name NOT LIKE '_metadata%' LIMIT 1"
        extract:
          docTable: $.response.data[0].table_name
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data
                operator: notEmpty

      - name: Count rows before insert
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: 'SELECT COUNT(*) as cnt FROM `{{docTable}}`'
        extract:
          rowsBefore: $.response.data[0].cnt
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true

      - name: Create document via API
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/consist-db/collections/notes/documents
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            documentId: 'unique()'
            data:
              content: 'Hello from Dokkimi'
            permissions:
              - 'read("any")'
              - 'delete("any")'
        extract:
          docId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Verify row was inserted in MariaDB
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: 'SELECT COUNT(*) as cnt FROM `{{docTable}}`'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].cnt
                operator: gt
                value: '{{rowsBefore}}'

      - name: Verify document content in MariaDB
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: "SELECT content FROM `{{docTable}}` WHERE content = 'Hello from Dokkimi'"
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data
                operator: notEmpty
              - path: $.response.data[0].content
                operator: eq
                value: Hello from Dokkimi

      # --- Delete and verify row is gone ---

      - name: Delete document via API
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/databases/consist-db/collections/notes/documents/{{docId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 204

      - name: Verify row is gone from MariaDB (not soft-deleted)
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: "SELECT COUNT(*) as cnt FROM `{{docTable}}` WHERE content = 'Hello from Dokkimi'"
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].cnt
                operator: eq
                value: 0

      # --- Oversized content: what does MariaDB actually store? ---

      - name: Oversized content is rejected (server-side validation)
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/consist-db/collections/notes/documents
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            documentId: 'unique()'
            data:
              content: ''
            permissions:
              - 'read("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 400

      - name: Max-length content is accepted (exactly 256 chars)
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/consist-db/collections/notes/documents
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            documentId: 'unique()'
            data:
              content: 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA'
            permissions:
              - 'read("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201
