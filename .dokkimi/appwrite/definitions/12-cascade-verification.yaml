name: appwrite-cascade-verification
description: >
  Verify that Appwrite's deletion cascades actually drop MariaDB tables
  and rows, not just API-level references. Uses dbQuery to inspect
  information_schema before and after cascading deletes.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/appwrite-mariadb.yaml
  - $ref: ../shared/appwrite-redis.yaml
  - $ref: ../shared/appwrite-worker-db.yaml
  - $ref: ../shared/appwrite-api.yaml
variables:
  adminEmail: admin@dokkimi.test
  adminPassword: TestPass123!
  projectId: cascade-test
tests:
  - name: Deletion cascade verification at DB level
    steps:
      # --- Setup ---
      - name: Register admin
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            userId: 'unique()'
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
            name: Admin
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Admin session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
        extract:
          fallbackCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create team
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/teams
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            teamId: 'unique()'
            name: Cascade Org
        extract:
          teamId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectId}}'
            name: Cascade Test
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create API key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectId}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Full Key
            scopes:
              - databases.read
              - databases.write
              - collections.read
              - collections.write
              - documents.read
              - documents.write
        extract:
          apiKey: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Count tables before creating anything ---

      - name: Count tables before
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: "SELECT COUNT(*) as cnt FROM information_schema.tables WHERE table_schema = 'appwrite'"
        extract:
          tablesBefore: $.response.data[0].cnt
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true

      # --- Create database with 2 collections and documents ---

      - name: Create database
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            databaseId: cascade-db
            name: Cascade DB
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create collection A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/cascade-db/collections
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            collectionId: col-a
            name: Collection A
            permissions:
              - 'read("any")'
              - 'create("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create collection B
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/cascade-db/collections
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            collectionId: col-b
            name: Collection B
            permissions:
              - 'read("any")'
              - 'create("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create attribute in collection A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/cascade-db/collections/col-a/attributes/string
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            key: name
            size: 256
            required: false
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [201, 202]

      - name: Wait for attribute
        repeat:
          count: 15
          as: attempt
          delayMs: 2000
          until:
            - path: $.response.body.status
              operator: eq
              value: available
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/cascade-db/collections/col-a/attributes/name
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'

      - name: Create document in collection A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/cascade-db/collections/col-a/documents
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            documentId: 'unique()'
            data:
              name: 'Should be deleted by cascade'
            permissions:
              - 'read("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Verify tables were created ---

      - name: Count tables after creation
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: "SELECT COUNT(*) as cnt FROM information_schema.tables WHERE table_schema = 'appwrite'"
        extract:
          tablesAfterCreate: $.response.data[0].cnt
        assertions:
          - assertions:
              - path: $.response.data[0].cnt
                operator: gt
                value: '{{tablesBefore}}'

      # --- Delete the entire database via API ---

      - name: Delete database (should cascade)
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/databases/cascade-db
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 204

      - name: Wait for cascade to propagate
        action:
          type: wait
          durationMs: 3000

      # --- Verify tables were dropped from MariaDB ---

      - name: API confirms database is gone
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/cascade-db
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 404

      - name: API confirms collection A is gone
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/cascade-db/collections/col-a
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [404, 500]

      - name: MariaDB tables decreased after cascade
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: "SELECT COUNT(*) as cnt FROM information_schema.tables WHERE table_schema = 'appwrite'"
        assertions:
          - assertions:
              - path: $.response.data[0].cnt
                operator: lt
                value: '{{tablesAfterCreate}}'
