name: appwrite-pagination-integrity
description: >
  Seed 25 documents, paginate through them, and verify no duplicates or
  gaps across pages. Cross-references API totals against MariaDB row counts.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/appwrite-mariadb.yaml
  - $ref: ../shared/appwrite-redis.yaml
  - $ref: ../shared/appwrite-worker-db.yaml
  - $ref: ../shared/appwrite-api.yaml
variables:
  adminEmail: admin@dokkimi.test
  adminPassword: TestPass123!
  projectId: pagination-test
tests:
  - name: Pagination integrity
    steps:
      # --- Setup ---
      - name: Register admin
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            userId: 'unique()'
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
            name: Admin
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Admin session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
        extract:
          fallbackCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create team
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/teams
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            teamId: 'unique()'
            name: Pagination Org
        extract:
          teamId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectId}}'
            name: Pagination Test
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create API key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectId}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Full Key
            scopes:
              - databases.read
              - databases.write
              - collections.read
              - collections.write
              - documents.read
              - documents.write
        extract:
          apiKey: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create database
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            databaseId: pag-db
            name: Pagination DB
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create collection
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/pag-db/collections
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            collectionId: items
            name: Items
            permissions:
              - 'read("any")'
              - 'create("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create title attribute
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/pag-db/collections/items/attributes/string
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            key: title
            size: 256
            required: false
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [201, 202]

      - name: Wait for attribute
        repeat:
          count: 15
          as: attempt
          delayMs: 2000
          until:
            - path: $.response.body.status
              operator: eq
              value: available
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/pag-db/collections/items/attributes/title
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'

      # --- Seed 25 documents ---

      - name: Seed document {{i}}
        for:
          from: 1
          to: 25
          as: i
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/pag-db/collections/items/documents
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            documentId: 'unique()'
            data:
              title: 'Document {{i}}'
            permissions:
              - 'read("any")'

      # --- Paginate and verify ---

      - name: Page 1 (limit 10, offset 0)
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/pag-db/collections/items/documents
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          queryParams:
            queries[]:
              - '{"method":"limit","values":[10]}'
              - '{"method":"offset","values":[0]}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.total
                operator: eq
                value: 25
              - count: $.response.body.documents
                operator: eq
                value: 10

      - name: Page 2 (limit 10, offset 10)
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/pag-db/collections/items/documents
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          queryParams:
            queries[]:
              - '{"method":"limit","values":[10]}'
              - '{"method":"offset","values":[10]}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.total
                operator: eq
                value: 25
              - count: $.response.body.documents
                operator: eq
                value: 10

      - name: Page 3 (limit 10, offset 20 — should return 5)
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/pag-db/collections/items/documents
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          queryParams:
            queries[]:
              - '{"method":"limit","values":[10]}'
              - '{"method":"offset","values":[20]}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.total
                operator: eq
                value: 25
              - count: $.response.body.documents
                operator: eq
                value: 5

      - name: Page past end returns empty
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/pag-db/collections/items/documents
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          queryParams:
            queries[]:
              - '{"method":"limit","values":[10]}'
              - '{"method":"offset","values":[30]}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.total
                operator: eq
                value: 25
              - count: $.response.body.documents
                operator: eq
                value: 0

      # --- Cross-reference with MariaDB ---

      - name: Find document table
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: "SELECT table_name FROM information_schema.columns WHERE table_schema = 'appwrite' AND column_name = 'title' AND table_name NOT LIKE '_metadata%' LIMIT 1"
        extract:
          docTable: $.response.data[0].table_name
        assertions:
          - assertions:
              - path: $.response.data
                operator: notEmpty

      - name: MariaDB row count matches API total
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: 'SELECT COUNT(*) as cnt FROM `{{docTable}}`'
        assertions:
          - assertions:
              - path: $.response.data[0].cnt
                operator: eq
                value: 25
