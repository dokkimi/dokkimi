name: action-ref
description: |
  Validates that step actions can use $ref to load from shared action
  fragments. Tests both httpRequest and dbQuery action refs, with
  inline overrides on the action and variable interpolation.
config:
  timeoutSeconds: 60
items:
  - $ref: ../shared/service-a.yaml
  - $ref: ../shared/postgres.yaml
tests:
  - name: Action $ref loads an httpRequest fragment
    variables:
      serviceName: service-a
    steps:
      - name: Health check via shared action fragment
        action:
          $ref: ../shared/health-check-action.yaml
        assertions:
          - assertions:
              - path: response.status
                operator: eq
                value: 200
              - path: response.body
                operator: eq
                value: OK

  - name: Action $ref loads a dbQuery fragment
    steps:
      - name: List users via shared action fragment
        action:
          $ref: ../shared/list-users-action.yaml
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data
                operator: length
                value: 2
              - path: data[0].name
                operator: eq
                value: Alice
              - path: data[1].name
                operator: eq
                value: Bob

  - name: Action $ref with inline overrides
    variables:
      serviceName: service-a
    steps:
      - name: Health check with overridden URL path
        action:
          $ref: ../shared/health-check-action.yaml
          url: service-a/health
        assertions:
          - assertions:
              - path: response.status
                operator: eq
                value: 200
