name: health-checks
description: Smoke tests — verify all traffic-tester instances are up and responding
config:
  timeoutSeconds: 60
items:
  - $ref: ../shared/service-a.yaml
  - $ref: ../shared/service-b.json
  - $ref: ../shared/service-c.yaml
tests:
  - name: Service A returns 200 OK
    steps:
      - action:
          type: httpRequest
          method: GET
          url: service-a/health
        assertions:
          - assertions:
              - path: response.status
                operator: eq
                value: 200
              - path: response.body
                operator: eq
                value: OK
  - name: Service C returns 200 OK
    steps:
      - action:
          type: httpRequest
          method: GET
          url: service-c/health
        assertions:
          - assertions:
              - path: response.status
                operator: eq
                value: 200
              - path: response.body
                operator: eq
                value: OK
