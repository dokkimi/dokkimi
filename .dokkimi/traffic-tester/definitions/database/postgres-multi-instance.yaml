name: postgres-multi-instance
description: |
  Two independent PostgreSQL instances in the same namespace, each with
  its own schema and seed data. Validates that the wire protocol proxy,
  Docker DNS routing, health checks, and test-agent connection pooling
  all work correctly when multiple postgres databases coexist.
config:
  timeoutSeconds: 120
items:
  - type: DATABASE
    name: users-db
    database: postgres
    initFilePath: ../../init-files/init.sql
  - type: DATABASE
    name: orders-db
    database: postgres
    initFilePath: ../../init-files/init-postgres-orders.sql
tests:
  - name: Each instance has its own schema
    steps:
      - name: Count users in users-db
        action:
          type: dbQuery
          database: users-db
          query: 'SELECT COUNT(*)::int AS cnt FROM users'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].cnt
                operator: gte
                value: 1
      - name: Count orders in orders-db
        action:
          type: dbQuery
          database: orders-db
          query: 'SELECT COUNT(*)::int AS cnt FROM orders'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].cnt
                operator: gte
                value: 1
  - name: users table does not exist in orders-db
    steps:
      - name: Query users table on orders-db should fail
        action:
          type: dbQuery
          database: orders-db
          query: 'SELECT * FROM users'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: false
              - path: $.response.error
                operator: contains
                value: users

  - name: orders table does not exist in users-db
    steps:
      - name: Query orders table on users-db should fail
        action:
          type: dbQuery
          database: users-db
          query: 'SELECT * FROM orders'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: false
              - path: $.response.error
                operator: contains
                value: orders

  - name: Parallel writes to both instances
    steps:
      - name: Insert into users-db
        action:
          type: dbQuery
          database: users-db
          query: "INSERT INTO users (email, name) VALUES ('dave@example.com', 'Dave') RETURNING id, name"
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].name
                operator: eq
                value: Dave
      - name: Insert into orders-db
        action:
          type: dbQuery
          database: orders-db
          query: "INSERT INTO orders (customer_name, total_cents, status) VALUES ('Dave', 3500, 'pending') RETURNING id, customer_name"
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].customer_name
                operator: eq
                value: Dave
  - name: Read back from both instances after writes
    steps:
      - name: Read Dave from users-db
        action:
          type: dbQuery
          database: users-db
          query: "SELECT name, email FROM users WHERE email = 'dave@example.com'"
        assertions:
          - assertions:
              - path: $.response.data
                operator: length
                value: 1
              - path: $.response.data[0].name
                operator: eq
                value: Dave
              - path: $.response.data[0].email
                operator: eq
                value: dave@example.com
      - name: Read Dave's order from orders-db
        action:
          type: dbQuery
          database: orders-db
          query: "SELECT customer_name, total_cents, status FROM orders WHERE customer_name = 'Dave'"
        assertions:
          - assertions:
              - path: $.response.data
                operator: length
                value: 1
              - path: $.response.data[0].total_cents
                operator: eq
                value: 3500
              - path: $.response.data[0].status
                operator: eq
                value: pending
  - name: Typed results from both instances
    steps:
      - name: Read seeded user by id
        action:
          type: dbQuery
          database: users-db
          query: 'SELECT id, name FROM users WHERE id = 1'
        assertions:
          - assertions:
              - path: $.response.data
                operator: length
                value: 1
              - path: $.response.data[0].id
                operator: eq
                value: 1
      - name: Read seeded order by id
        action:
          type: dbQuery
          database: orders-db
          query: 'SELECT id, total_cents FROM orders WHERE id = 1'
        assertions:
          - assertions:
              - path: $.response.data
                operator: length
                value: 1
              - path: $.response.data[0].id
                operator: eq
                value: 1
