name: mongodb-queries
description: MongoDB integration — find seeded orders, insert new documents, and verify via direct DB query
config:
  timeoutSeconds: 120
items:
  - $ref: ../../shared/service-a.yaml
  - $ref: ../../shared/mongo.yaml
tests:
  - name: Find seeded orders
    variables:
      mongoConnStr: mongodb://dokkimi:dokkimi@mongo-db:27017/dokkimi?authSource=admin
    steps:
      - name: Find all seeded orders in MongoDB
        action:
          type: httpRequest
          method: POST
          url: service-a/query
          headers:
            Content-Type: application/json
          body:
            queries:
              - databaseType: mongodb
                connectionString: '{{mongoConnStr}}'
                command: '{"operation":"find","collection":"orders","filter":{}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - type: $.response.body.queryResults[0][0].result
                operator: eq
                value: array
              - path: $.response.body.queryResults[0][0].result[0].orderId
                operator: eq
                value: ORD-001
              - path: $.response.body.queryResults[0][0].result[1].orderId
                operator: eq
                value: ORD-002
  - name: Insert and verify new order
    variables:
      mongoConnStr: mongodb://dokkimi:dokkimi@mongo-db:27017/dokkimi?authSource=admin
    steps:
      - name: Insert a new order into MongoDB
        action:
          type: httpRequest
          method: POST
          url: service-a/insert
          headers:
            Content-Type: application/json
          body:
            queries:
              - databaseType: mongodb
                connectionString: '{{mongoConnStr}}'
                command: >-
                  {"operation":"insertOne","collection":"orders","document":{"orderId":"ORD-003","customer":"charlie@example.com","items":[{"sku":"Doohickey","qty":5,"price":4.99}],"total":24.95,"status":"pending"}}
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.queryResults[0][0].result.acknowledged
                operator: eq
                value: true
      - name: Verify inserted order via direct DB query
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"findOne","collection":"orders","filter":{"orderId":"ORD-003"}}'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].customer
                operator: eq
                value: charlie@example.com
              - path: $.response.data[0].status
                operator: eq
                value: pending
