name: mysql-concurrent-and-stress
description: |
  Validates the MySQL wire protocol proxy under concurrent access and with
  larger result sets. Parallel dbQuery steps hit the same database
  simultaneously, and a generated sequence query returns many rows to
  stress the proxy relay pipeline.
config:
  timeoutSeconds: 90
items:
  - $ref: ../../shared/mysql.json
tests:
  - name: Parallel reads hit the proxy concurrently
    steps:
      - name: Parallel requests
        action:
          type: parallel
          actions:
            - type: dbQuery
              database: mysql-db
              query: 'SELECT name, price FROM products WHERE id = 1'
            - type: dbQuery
              database: mysql-db
              query: 'SELECT name, price FROM products WHERE id = 2'
            - type: dbQuery
              database: mysql-db
              query: 'SELECT COUNT(*) AS total FROM products'
  - name: Parallel writes then read-back
    steps:
      - name: Parallel requests
        action:
          type: parallel
          actions:
            - type: dbQuery
              database: mysql-db
              query: "INSERT INTO products (name, price, stock) VALUES ('Sprocket', 7.50, 300)"
            - type: dbQuery
              database: mysql-db
              query: "INSERT INTO products (name, price, stock) VALUES ('Cog', 3.25, 500)"
      - name: Verify both were inserted
        action:
          type: dbQuery
          database: mysql-db
          query: "SELECT name FROM products WHERE name IN ('Sprocket', 'Cog') ORDER BY name"
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data
                operator: length
                value: 2
              - path: $.response.data[0].name
                operator: eq
                value: Cog
              - path: $.response.data[1].name
                operator: eq
                value: Sprocket

  - name: Large result set via sequence table
    steps:
      - name: Generate 500 rows using a recursive CTE
        action:
          type: dbQuery
          database: mysql-db
          query: >
            WITH RECURSIVE seq AS (
              SELECT 1 AS n
              UNION ALL
              SELECT n + 1 FROM seq WHERE n < 500
            )
            SELECT n AS id, CONCAT('row-', n) AS label FROM seq
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data
                operator: length
                value: 500
              - path: $.response.data[0].id
                operator: eq
                value: 1
              - path: $.response.data[0].label
                operator: eq
                value: row-1
              - path: $.response.data[499].id
                operator: eq
                value: 500
              - path: $.response.data[499].label
                operator: eq
                value: row-500

  - name: INSERT then immediate SELECT with variable extraction
    steps:
      - name: Insert Gizmo
        action:
          type: dbQuery
          database: mysql-db
          query: "INSERT INTO products (name, price, stock) VALUES ('Gizmo', 19.99, 42)"
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
      - name: Fetch Gizmo by name
        action:
          type: dbQuery
          database: mysql-db
          query: "SELECT id, name, price, stock FROM products WHERE name = 'Gizmo'"
        extract:
          gizmoId: '$.response.data[0].id'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].name
                operator: eq
                value: Gizmo
              - path: $.response.data[0].price
                operator: eq
                value: 19.99
              - path: $.response.data[0].stock
                operator: eq
                value: 42
      - name: Read Gizmo back by extracted id
        action:
          type: dbQuery
          database: mysql-db
          query: 'SELECT name FROM products WHERE id = ?'
          params:
            '1': '{{gizmoId}}'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].name
                operator: eq
                value: Gizmo

  - name: Multiple column types in one query
    steps:
      - name: Mixed types from a single SELECT
        action:
          type: dbQuery
          database: mysql-db
          query: >
            SELECT
              42 AS int_val,
              3.14 AS float_val,
              'hello' AS text_val,
              NULL AS null_val,
              CAST(99999 AS SIGNED) AS bigint_val
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].int_val
                operator: eq
                value: 42
              - path: $.response.data[0].int_val
                operator: type
                value: number
              - path: $.response.data[0].float_val
                operator: eq
                value: 3.14
              - path: $.response.data[0].text_val
                operator: eq
                value: hello
              - path: $.response.data[0].null_val
                operator: isEmpty
              - path: $.response.data[0].bigint_val
                operator: eq
                value: 99999
