name: postgres-queries
description: PostgreSQL integration — read seeded data, insert rows, and verify via direct DB query
config:
  timeoutSeconds: 120
items:
  - $ref: ../../shared/service-a.yaml
  - $ref: ../../shared/postgres.yaml
tests:
  - name: Query seeded users
    variables:
      pgConnStr: postgresql://dokkimi:dokkimi@postgres-db:5432/dokkimi
    steps:
      - name: Query seeded users from PostgreSQL
        action:
          type: httpRequest
          method: POST
          url: service-a/query
          headers:
            Content-Type: application/json
          body:
            queries:
              - databaseType: postgres
                connectionString: '{{pgConnStr}}'
                command: SELECT * FROM users ORDER BY id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.queryResults
                operator: type
                value: array
              - path: $.response.body.queryResults[0][0].result
                operator: type
                value: array
              - path: $.response.body.queryResults[0][0].result[0].name
                operator: eq
                value: Alice
              - path: $.response.body.queryResults[0][0].result[1].name
                operator: eq
                value: Bob
  - name: Insert and read back
    variables:
      pgConnStr: postgresql://dokkimi:dokkimi@postgres-db:5432/dokkimi
      newEmail: charlie@example.com
      newName: Charlie
    steps:
      - name: Insert a new user
        action:
          type: httpRequest
          method: POST
          url: service-a/insert
          headers:
            Content-Type: application/json
          body:
            queries:
              - databaseType: postgres
                connectionString: '{{pgConnStr}}'
                command: INSERT INTO users (email, name) VALUES ('{{newEmail}}', '{{newName}}') RETURNING *
        extract:
          insertedId: $.response.body.queryResults[0][0].result[0].id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.queryResults[0][0].result[0].email
                operator: eq
                value: '{{newEmail}}'
              - path: $.response.body.queryResults[0][0].result[0].name
                operator: eq
                value: '{{newName}}'
      - name: Verify inserted user via direct DB query
        action:
          type: dbQuery
          database: postgres-db
          query: SELECT * FROM users WHERE email = 'charlie@example.com'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].name
                operator: eq
                value: Charlie
              - path: $.response.data[0].email
                operator: eq
                value: charlie@example.com
