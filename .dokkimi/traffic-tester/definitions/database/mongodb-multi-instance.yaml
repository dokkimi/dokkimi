name: mongodb-multi-instance
description: |
  Two independent MongoDB instances in the same namespace. Validates that
  the wire protocol proxy, Docker DNS routing, health checks, and
  test-agent connection management all work correctly when multiple
  MongoDB databases coexist. Each instance has its own data.
config:
  timeoutSeconds: 120
items:
  - type: DATABASE
    name: orders-mongo
    database: mongodb
  - type: DATABASE
    name: analytics-mongo
    database: mongodb
tests:
  - name: Each instance has independent data
    steps:
      - name: Insert into both instances
        action:
          type: parallel
          actions:
            - type: dbQuery
              database: orders-mongo
              query: '{"operation":"insertOne","collection":"orders","document":{"orderId":"M-001","source":"orders"}}'
            - type: dbQuery
              database: analytics-mongo
              query: '{"operation":"insertOne","collection":"events","document":{"eventId":"E-001","source":"analytics"}}'
      - name: Read back from orders-mongo
        action:
          type: dbQuery
          database: orders-mongo
          query: '{"operation":"find","collection":"orders","filter":{"orderId":"M-001"}}'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - count: $.response.data
                operator: eq
                value: 1
              - path: $.response.data[0].source
                operator: eq
                value: orders
      - name: Read back from analytics-mongo
        action:
          type: dbQuery
          database: analytics-mongo
          query: '{"operation":"find","collection":"events","filter":{"eventId":"E-001"}}'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - count: $.response.data
                operator: eq
                value: 1
              - path: $.response.data[0].source
                operator: eq
                value: analytics
  - name: Data from instance A is not in instance B
    steps:
      - name: Insert a unique key into orders-mongo
        action:
          type: dbQuery
          database: orders-mongo
          query: '{"operation":"insertOne","collection":"isolation_test","document":{"key":"only-in-orders"}}'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
      - name: Confirm key is absent from analytics-mongo
        action:
          type: dbQuery
          database: analytics-mongo
          query: '{"operation":"find","collection":"isolation_test","filter":{"key":"only-in-orders"}}'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - count: $.response.data
                operator: eq
                value: 0

  - name: Parallel writes to both instances
    steps:
      - name: Parallel inserts
        action:
          type: parallel
          actions:
            - type: dbQuery
              database: orders-mongo
              query: '{"operation":"insertOne","collection":"parallel","document":{"id":"p1","instance":"orders"}}'
            - type: dbQuery
              database: analytics-mongo
              query: '{"operation":"insertOne","collection":"parallel","document":{"id":"p1","instance":"analytics"}}'
      - name: Read back from orders-mongo
        action:
          type: dbQuery
          database: orders-mongo
          query: '{"operation":"find","collection":"parallel","filter":{"id":"p1"}}'
        assertions:
          - assertions:
              - count: $.response.data
                operator: eq
                value: 1
              - path: $.response.data[0].instance
                operator: eq
                value: orders
      - name: Read back from analytics-mongo
        action:
          type: dbQuery
          database: analytics-mongo
          query: '{"operation":"find","collection":"parallel","filter":{"id":"p1"}}'
        assertions:
          - assertions:
              - count: $.response.data
                operator: eq
                value: 1
              - path: $.response.data[0].instance
                operator: eq
                value: analytics
  - name: Different collections per instance
    steps:
      - name: Insert into different collections
        action:
          type: parallel
          actions:
            - type: dbQuery
              database: orders-mongo
              query: '{"operation":"insertOne","collection":"shipments","document":{"trackingId":"TRK-001","carrier":"FedEx"}}'
            - type: dbQuery
              database: analytics-mongo
              query: '{"operation":"insertOne","collection":"metrics","document":{"metric":"pageviews","value":42}}'
      - name: Read back shipment from orders-mongo
        action:
          type: dbQuery
          database: orders-mongo
          query: '{"operation":"find","collection":"shipments","filter":{"trackingId":"TRK-001"}}'
        assertions:
          - assertions:
              - count: $.response.data
                operator: eq
                value: 1
              - path: $.response.data[0].carrier
                operator: eq
                value: FedEx
      - name: Read back metric from analytics-mongo
        action:
          type: dbQuery
          database: analytics-mongo
          query: '{"operation":"find","collection":"metrics","filter":{"metric":"pageviews"}}'
        assertions:
          - assertions:
              - count: $.response.data
                operator: eq
                value: 1
              - path: $.response.data[0].value
                operator: eq
                value: 42
