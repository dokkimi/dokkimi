name: postgres-concurrent-and-stress
description: |
  Validates the wire protocol proxy under concurrent access and with
  larger result sets. Parallel dbQuery steps hit the same database
  simultaneously, and a generated series query returns many rows to
  stress the proxy relay pipeline.
config:
  timeoutSeconds: 90
items:
  - $ref: ../../shared/postgres.yaml
tests:
  - name: Parallel reads hit the proxy concurrently
    steps:
      - name: Parallel requests
        action:
          type: parallel
          actions:
            - type: dbQuery
              database: postgres-db
              query: 'SELECT name, email FROM users WHERE id = 1'
            - type: dbQuery
              database: postgres-db
              query: 'SELECT name, email FROM users WHERE id = 2'
            - type: dbQuery
              database: postgres-db
              query: 'SELECT COUNT(*)::int AS total FROM users'
  - name: Parallel writes then read-back
    steps:
      - name: Parallel requests
        action:
          type: parallel
          actions:
            - type: dbQuery
              database: postgres-db
              query: "INSERT INTO users (email, name) VALUES ('frank@example.com', 'Frank')"
            - type: dbQuery
              database: postgres-db
              query: "INSERT INTO users (email, name) VALUES ('grace@example.com', 'Grace')"
      - name: Verify both were inserted
        action:
          type: dbQuery
          database: postgres-db
          query: "SELECT name FROM users WHERE email IN ('frank@example.com', 'grace@example.com') ORDER BY name"
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data
                operator: length
                value: 2
              - path: $.response.data[0].name
                operator: eq
                value: Frank
              - path: $.response.data[1].name
                operator: eq
                value: Grace

  - name: Large result set via generate_series
    steps:
      - name: Generate 500 rows
        action:
          type: dbQuery
          database: postgres-db
          query: "SELECT g AS id, 'row-' || g AS label FROM generate_series(1, 500) AS g"
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data
                operator: length
                value: 500
              - path: $.response.data[0].id
                operator: eq
                value: 1
              - path: $.response.data[0].label
                operator: eq
                value: row-1
              - path: $.response.data[499].id
                operator: eq
                value: 500
              - path: $.response.data[499].label
                operator: eq
                value: row-500

  - name: INSERT then immediate SELECT in sequential steps
    steps:
      - name: Insert Hank
        action:
          type: dbQuery
          database: postgres-db
          query: "INSERT INTO users (email, name) VALUES ('hank@example.com', 'Hank') RETURNING id"
        extract:
          hankId: '$.response.data[0].id'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].id
                operator: type
                value: number
      - name: Read Hank back by extracted id
        action:
          type: dbQuery
          database: postgres-db
          query: 'SELECT name, email FROM users WHERE id = $1'
          params:
            '1': '{{hankId}}'
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].name
                operator: eq
                value: Hank
              - path: $.response.data[0].email
                operator: eq
                value: hank@example.com

  - name: Multiple column types in one query
    steps:
      - name: Mixed types from a single SELECT
        action:
          type: dbQuery
          database: postgres-db
          query: >
            SELECT
              42::int AS int_val,
              3.14::float8 AS float_val,
              true AS bool_val,
              'hello'::text AS text_val,
              NULL::text AS null_val,
              ARRAY[1,2,3]::text AS array_val
        assertions:
          - assertions:
              - path: $.response.success
                operator: eq
                value: true
              - path: $.response.data[0].int_val
                operator: eq
                value: 42
              - path: $.response.data[0].int_val
                operator: type
                value: number
              - path: $.response.data[0].float_val
                operator: eq
                value: 3.14
              - path: $.response.data[0].bool_val
                operator: eq
                value: true
              - path: $.response.data[0].bool_val
                operator: type
                value: boolean
              - path: $.response.data[0].text_val
                operator: eq
                value: hello
              - path: $.response.data[0].null_val
                operator: isEmpty
