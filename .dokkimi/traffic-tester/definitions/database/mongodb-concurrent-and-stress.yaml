name: mongodb-concurrent-and-stress
description: |
  Stress tests for the MongoDB wire protocol proxy: parallel reads,
  parallel writes, bulk insertMany, and sequential insert-then-find
  with variable extraction.
config:
  timeoutSeconds: 120
items:
  - $ref: ../../shared/mongo.yaml
tests:
  - name: Parallel reads on seeded data
    steps:
      - name: Parallel requests
        action:
          type: parallel
          actions:
            - type: dbQuery
              database: mongo-db
              query: '{"operation":"find","collection":"orders","filter":{"orderId":"ORD-001"}}'
            - type: dbQuery
              database: mongo-db
              query: '{"operation":"find","collection":"orders","filter":{"orderId":"ORD-002"}}'
            - type: dbQuery
              database: mongo-db
              query: '{"operation":"find","collection":"orders","filter":{}}'
  - name: Parallel writes to different collections
    steps:
      - name: Parallel requests
        action:
          type: parallel
          actions:
            - type: dbQuery
              database: mongo-db
              query: '{"operation":"insertOne","collection":"products","document":{"sku":"WIDGET-A","price":9.99}}'
            - type: dbQuery
              database: mongo-db
              query: '{"operation":"insertOne","collection":"events","document":{"type":"pageview","url":"/home"}}'
      - name: Parallel requests
        action:
          type: parallel
          actions:
            - type: dbQuery
              database: mongo-db
              query: '{"operation":"find","collection":"products","filter":{"sku":"WIDGET-A"}}'
            - type: dbQuery
              database: mongo-db
              query: '{"operation":"find","collection":"events","filter":{"type":"pageview"}}'
  - name: Bulk insertMany
    steps:
      - name: Insert 5 documents at once
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"insertMany","collection":"bulk_items","documents":[{"name":"item1","val":1},{"name":"item2","val":2},{"name":"item3","val":3},{"name":"item4","val":4},{"name":"item5","val":5}]}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: rowsAffected
                operator: eq
                value: 5
      - name: Verify all 5 were inserted
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"find","collection":"bulk_items","filter":{}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data
                operator: length
                value: 5

  - name: Sequential insert then find with variable extraction
    steps:
      - name: Insert a user
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"insertOne","collection":"users","document":{"username":"testuser","email":"test@test.com","active":true}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
      - name: Find the user and extract email
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"find","collection":"users","filter":{"username":"testuser"}}'
        extract:
          userEmail: '$.data[0].email'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data[0].email
                operator: eq
                value: test@test.com
              - path: data[0].active
                operator: eq
                value: true
