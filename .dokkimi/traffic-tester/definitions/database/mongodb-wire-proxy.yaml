name: mongodb-wire-proxy
description: |
  Validates the MongoDB wire protocol proxy end-to-end: find, insert,
  update, delete, empty results, error handling, and typed results
  (numbers, strings, booleans, nested arrays).
  Query strings must match what the proxy reconstructs from the wire
  protocol — these are wire-level commands, not high-level driver ops.
config:
  timeoutSeconds: 90
items:
  - $ref: ../../shared/mongo.yaml
tests:
  - name: find returns seeded data
    steps:
      - name: Find all orders
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"find","collection":"orders","filter":{}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data
                operator: length
                value: 2

  - name: find with filter returns matching documents
    steps:
      - name: Find order by orderId
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"find","collection":"orders","filter":{"orderId":"ORD-001"}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data[0].customer
                operator: eq
                value: alice@example.com
              - path: data[0].total
                operator: eq
                value: 19.98
              - path: data[0].total
                operator: type
                value: number

  - name: find with no match returns empty data
    steps:
      - name: Search for non-existent order
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"find","collection":"orders","filter":{"orderId":"DOES-NOT-EXIST"}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data
                operator: length
                value: 0

  - name: insert and verify
    steps:
      - name: Insert a new order
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"insertOne","collection":"orders","document":{"orderId":"ORD-100","customer":"test@example.com","items":[{"sku":"TestItem","qty":1,"price":5}],"total":5,"status":"new"}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data[0].acknowledged
                operator: eq
                value: true
              - path: rowsAffected
                operator: eq
                value: 1
      - name: Verify the inserted order exists
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"find","collection":"orders","filter":{"orderId":"ORD-100"}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data[0].customer
                operator: eq
                value: test@example.com
              - path: data[0].status
                operator: eq
                value: new

  - name: update modifies a document
    steps:
      - name: Insert a document to update
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"insertOne","collection":"orders","document":{"orderId":"ORD-UPDATE","customer":"update@example.com","total":10,"status":"pending"}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
      - name: Update the status
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"updateOne","collection":"orders","filter":{"orderId":"ORD-UPDATE"},"update":{"$set":{"status":"shipped"}}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data[0].modifiedCount
                operator: eq
                value: 1
      - name: Verify the update
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"find","collection":"orders","filter":{"orderId":"ORD-UPDATE"}}'
        assertions:
          - assertions:
              - path: data[0].status
                operator: eq
                value: shipped

  - name: delete removes a document
    steps:
      - name: Insert a document to delete
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"insertOne","collection":"orders","document":{"orderId":"ORD-DELETE","customer":"delete@example.com","total":0,"status":"cancelled"}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
      - name: Delete the document
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"deleteOne","collection":"orders","filter":{"orderId":"ORD-DELETE"}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data[0].deletedCount
                operator: eq
                value: 1
      - name: Verify deletion
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"find","collection":"orders","filter":{"orderId":"ORD-DELETE"}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data
                operator: length
                value: 0

  - name: find with status filter returns matching documents only
    steps:
      - name: Find only completed orders
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"find","collection":"orders","filter":{"status":"completed"}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data[0].orderId
                operator: eq
                value: ORD-001

  - name: find on empty collection returns empty array
    steps:
      - name: Query a collection with no documents
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"find","collection":"nonexistent_collection","filter":{}}'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data
                operator: length
                value: 0

  - name: typed results - nested arrays and numbers
    steps:
      - name: Verify nested array items
        action:
          type: dbQuery
          database: mongo-db
          query: '{"operation":"find","collection":"orders","filter":{"orderId":"ORD-001"}}'
        extract:
          orderCustomer: '$.data[0].customer'
        assertions:
          - assertions:
              - path: success
                operator: eq
                value: true
              - path: data[0].items
                operator: type
                value: array
              - path: data[0].status
                operator: type
                value: string
