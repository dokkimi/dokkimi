name: elasticsearch-traffic-assertions
description: Proves traffic interception works with Elasticsearch — a service calls ES and we assert on the intercepted request/response bodies
config:
  timeoutSeconds: 120
items:
  - $ref: ../../shared/elasticsearch.yaml
  - $ref: ../../shared/service-a.yaml

tests:
  - name: Intercepted traffic from service to Elasticsearch has readable bodies
    steps:
      - name: Seed an index with a document
        action:
          type: httpRequest
          method: PUT
          url: elasticsearch/products/_doc/1
          headers:
            Content-Type: application/json
          body:
            name: Wireless Headphones
            category: electronics
            price_cents: 7999
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [200, 201]

      - name: Refresh for searchability
        action:
          type: httpRequest
          method: POST
          url: elasticsearch/products/_refresh

      - name: Service-a searches Elasticsearch and we assert on the intercepted traffic
        action:
          type: httpRequest
          method: POST
          url: service-a/forward
          headers:
            Content-Type: application/json
          body:
            requests:
              - baseURL: http://elasticsearch
                url: /products/_search
                method: POST
                headers:
                  Content-Type: application/json
                data:
                  query:
                    match:
                      name: headphones
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
          - match:
              path: $.traffic
              where:
                - path: $$.origin
                  operator: eq
                  value: service-a
                - path: $$.request.url
                  operator: contains
                  value: elasticsearch/products/_search
              count: 1
            assertions:
              - path: $.match.request.body.query.match.name
                operator: eq
                value: headphones
              - path: $.match.response.status
                operator: eq
                value: 200
              - path: $.match.response.body.hits.total.value
                operator: eq
                value: 1
              - path: $.match.response.body.hits.hits[0]._source.name
                operator: eq
                value: Wireless Headphones
