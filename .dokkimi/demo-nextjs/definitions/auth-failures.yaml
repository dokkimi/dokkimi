name: auth-failures
description: |
  Two cheap negative-path tests that don't need the OAuth chain to fire,
  so they skip the mocks and drive directly with httpRequest:
    1. GET /api/auth/callback without a code/state — must 400.
    2. POST /api/bookmarks without a session cookie — must 401.
  Together these cover the two boundary conditions on the auth surface
  that the happy-path UI tests don't exercise.
config:
  timeoutSeconds: 60
items:
  - $ref: ../shared/nextjs-demo.yaml
  - $ref: ../shared/postgres.yaml
tests:
  - name: Bare callback without code/state returns 400
    steps:
      - name: GET /api/auth/callback with no params
        action:
          type: httpRequest
          method: GET
          url: nextjs-demo/api/auth/callback
        assertions:
          - assertions:
              - path: response.status
                operator: eq
                value: 400
              - path: response.body.error
                operator: eq
                value: missing code or state
  - name: Unauthenticated write returns 401
    steps:
      - name: POST /api/bookmarks without session
        action:
          type: httpRequest
          method: POST
          url: nextjs-demo/api/bookmarks
          headers:
            Content-Type: application/json
          body:
            title: Should never persist
            url: https://example.com/nope
            country: US
        assertions:
          - assertions:
              - path: response.status
                operator: eq
                value: 401
              - path: response.body.error
                operator: eq
                value: unauthorized
