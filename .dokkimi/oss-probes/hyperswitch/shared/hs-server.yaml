type: SERVICE
name: hs-server
description: Hyperswitch payment router — handles payment requests, routes to connectors
image: docker.juspay.io/juspaydotin/hyperswitch-router:latest
port: 8080
healthCheck: /health
stage: 1
command: ['/bin/bash', '/entrypoint.sh']
mountFiles:
  - source: ../docker/docker_compose.toml
    target: /local/config/docker_compose.toml
  - source: ../docker/entrypoint.sh
    target: /entrypoint.sh
env:
  - name: RUN_ENV
    value: development
  - name: ROUTER__LOG__CONSOLE__ENABLED
    value: 'true'
  - name: ROUTER__LOG__CONSOLE__LEVEL
    value: DEBUG
  - name: ROUTER__LOG__CONSOLE__LOG_FORMAT
    value: Default
  - name: ROUTER__LOG__TELEMETRY__TRACES_ENABLED
    value: 'false'
  - name: ROUTER__LOG__TELEMETRY__METRICS_ENABLED
    value: 'false'
