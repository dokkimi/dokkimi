name: caldiy-double-booking-race
description: |
  Tests for TOCTOU race condition in Cal.diy's booking system.
  ensureAvailableUsers() runs OUTSIDE the Prisma transaction that
  creates the booking (RegularBookingService.ts ~line 917 vs ~1707).
  However, a Prisma extension generates a deterministic idempotencyKey
  from (startTime, endTime, hostUserId) with a @unique constraint,
  which prevents duplicate bookings at the database level.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/cal-postgres.yaml
  - $ref: ../shared/cal-redis.yaml
  - $ref: ../shared/cal-web.yaml
tests:
  - name: Double-booking via concurrent requests
    steps:
      - name: Create admin user
        action:
          type: httpRequest
          method: POST
          url: calcom/api/auth/setup
          headers:
            Content-Type: application/json
          body:
            username: testhost
            full_name: Test Host User
            email_address: host@dokkimi-test.com
            password: TestPassword123!!
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      - name: Create schedule for host user
        action:
          type: dbQuery
          database: cal-postgres
          query: >
            INSERT INTO "Schedule" ("userId", "name", "timeZone")
            VALUES (1, 'Working Hours', 'UTC')
            RETURNING id

      - name: Create all-day availability
        action:
          type: dbQuery
          database: cal-postgres
          query: >
            INSERT INTO "Availability" ("scheduleId", "days", "startTime", "endTime")
            VALUES (1, ARRAY[0,1,2,3,4,5,6], '00:00:00', '23:59:00')

      - name: Set user default schedule and mark onboarding complete
        action:
          type: dbQuery
          database: cal-postgres
          query: >
            UPDATE "users"
            SET "defaultScheduleId" = 1,
                "completedOnboarding" = true,
                "timeZone" = 'UTC'
            WHERE id = 1

      - name: Create event type
        action:
          type: dbQuery
          database: cal-postgres
          query: >
            INSERT INTO "EventType"
              ("title", "slug", "length", "userId", "scheduleId",
               "minimumBookingNotice", "hidden")
            VALUES
              ('30 Min Meeting', '30min', 30, 1, 1, 0, false)
            RETURNING id

      - name: Link event type to host user
        action:
          type: dbQuery
          database: cal-postgres
          query: >
            INSERT INTO "_user_eventtype" ("A", "B") VALUES (1, 1)

      - name: Verify setup — event type has a linked user
        action:
          type: dbQuery
          database: cal-postgres
          query: >
            SELECT e.id, e.title, u.username
            FROM "EventType" e
            JOIN "_user_eventtype" ue ON ue."A" = e.id
            JOIN "users" u ON u.id = ue."B"
            WHERE e.id = 1
        assertions:
          - assertions:
              - path: $.response.data[0].username
                operator: eq
                value: testhost

      - name: Send five concurrent bookings for the same slot
        action:
          type: parallel
          actions:
            - type: httpRequest
              method: POST
              url: calcom/api/book/event
              headers:
                Content-Type: application/json
              body:
                eventTypeId: 1
                start: '2026-07-10T14:00:00.000Z'
                end: '2026-07-10T14:30:00.000Z'
                timeZone: UTC
                language: en
                metadata: {}
                responses:
                  name: Booker Alpha
                  email: alpha@dokkimi-test.com
            - type: httpRequest
              method: POST
              url: calcom/api/book/event
              headers:
                Content-Type: application/json
              body:
                eventTypeId: 1
                start: '2026-07-10T14:00:00.000Z'
                end: '2026-07-10T14:30:00.000Z'
                timeZone: UTC
                language: en
                metadata: {}
                responses:
                  name: Booker Beta
                  email: beta@dokkimi-test.com
            - type: httpRequest
              method: POST
              url: calcom/api/book/event
              headers:
                Content-Type: application/json
              body:
                eventTypeId: 1
                start: '2026-07-10T14:00:00.000Z'
                end: '2026-07-10T14:30:00.000Z'
                timeZone: UTC
                language: en
                metadata: {}
                responses:
                  name: Booker Gamma
                  email: gamma@dokkimi-test.com
            - type: httpRequest
              method: POST
              url: calcom/api/book/event
              headers:
                Content-Type: application/json
              body:
                eventTypeId: 1
                start: '2026-07-10T14:00:00.000Z'
                end: '2026-07-10T14:30:00.000Z'
                timeZone: UTC
                language: en
                metadata: {}
                responses:
                  name: Booker Delta
                  email: delta@dokkimi-test.com
            - type: httpRequest
              method: POST
              url: calcom/api/book/event
              headers:
                Content-Type: application/json
              body:
                eventTypeId: 1
                start: '2026-07-10T14:00:00.000Z'
                end: '2026-07-10T14:30:00.000Z'
                timeZone: UTC
                language: en
                metadata: {}
                responses:
                  name: Booker Epsilon
                  email: epsilon@dokkimi-test.com

      - name: Count accepted bookings for the contested slot
        action:
          type: dbQuery
          database: cal-postgres
          query: >
            SELECT count(*)::int AS booking_count
            FROM "Booking"
            WHERE "eventTypeId" = 1
              AND "startTime" = '2026-07-10 14:00:00'
              AND status = 'accepted'
        assertions:
          - assertions:
              - path: $.response.data[0].booking_count
                operator: eq
                value: 1
