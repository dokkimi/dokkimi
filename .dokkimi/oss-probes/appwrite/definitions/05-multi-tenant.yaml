name: appwrite-multi-tenant
description: >
  Test multi-tenant isolation between projects. Create two projects with separate
  API keys and data, then verify that one project cannot access the other's resources.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/appwrite-mariadb.yaml
  - $ref: ../shared/appwrite-redis.yaml
  - $ref: ../shared/appwrite-worker-db.yaml
  - $ref: ../shared/appwrite-api.yaml
variables:
  adminEmail: admin@dokkimi.test
  adminPassword: TestPass123!
  projectA: tenant-a
  projectB: tenant-b
tests:
  - name: Cross-project isolation
    steps:
      # --- Setup admin ---
      - name: Register admin
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            userId: 'unique()'
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
            name: Admin
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Admin session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
        extract:
          fallbackCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create team
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/teams
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            teamId: 'unique()'
            name: Multi-Tenant Org
        extract:
          teamId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Create Project A ---
      - name: Create Project A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectA}}'
            name: Tenant A
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create Project A API key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectA}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Key A
            scopes:
              - users.read
              - users.write
              - databases.read
              - databases.write
              - collections.read
              - collections.write
              - documents.read
              - documents.write
        extract:
          keyA: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Create Project B ---
      - name: Create Project B
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectB}}'
            name: Tenant B
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create Project B API key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectB}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Key B
            scopes:
              - users.read
              - users.write
              - databases.read
              - databases.write
              - collections.read
              - collections.write
              - documents.read
              - documents.write
        extract:
          keyB: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Create data in Project A ---
      - name: Create database in Project A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyA}}'
          body:
            databaseId: secrets-db
            name: Secrets
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create collection in Project A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/secrets-db/collections
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyA}}'
          body:
            collectionId: credentials
            name: Credentials
            permissions:
              - 'read("any")'
              - 'create("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create attribute in Project A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/secrets-db/collections/credentials/attributes/string
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyA}}'
          body:
            key: secret
            size: 512
            required: false
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [201, 202]

      - name: Wait for attribute in Project A
        repeat:
          count: 15
          as: attempt
          delayMs: 2000
          until:
            - path: $.response.body.status
              operator: eq
              value: available
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/secrets-db/collections/credentials/attributes/secret
          headers:
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyA}}'

      - name: Create secret document in Project A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/secrets-db/collections/credentials/documents
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyA}}'
          body:
            documentId: 'unique()'
            data:
              secret: 'TOP_SECRET_API_KEY_12345'
            permissions:
              - 'read("any")'
        extract:
          secretDocId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create user in Project A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/users
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyA}}'
          body:
            userId: 'unique()'
            email: secret-user@tenant-a.test
            password: TenantAPass123!
            name: Tenant A User
        extract:
          userA: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Cross-project access attempts with Project B key ---

      - name: 'Project B key CANNOT list Project A databases'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases
          headers:
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyB}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      - name: 'Project B key CANNOT read Project A document'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/secrets-db/collections/credentials/documents/{{secretDocId}}
          headers:
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyB}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      - name: 'Project B key CANNOT list Project A users'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users
          headers:
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyB}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      - name: 'Project B key CANNOT delete Project A user'
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/users/{{userA}}
          headers:
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyB}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      - name: 'Project B key CANNOT create data in Project A'
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/secrets-db/collections/credentials/documents
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyB}}'
          body:
            documentId: 'unique()'
            data:
              secret: 'INJECTED_BY_TENANT_B'
            permissions:
              - 'read("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 401

      # --- Same resource IDs in Project B should not collide ---

      - name: 'Project B can create database with same ID as Project A'
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectB}}'
            X-Appwrite-Key: '{{keyB}}'
          body:
            databaseId: secrets-db
            name: B Secrets
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: 'Project B database is empty (not leaking Project A data)'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/secrets-db/collections
          headers:
            X-Appwrite-Project: '{{projectB}}'
            X-Appwrite-Key: '{{keyB}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.total
                operator: eq
                value: 0

      # --- Verify Project A data is intact ---

      - name: 'Project A secret document unchanged'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/secrets-db/collections/credentials/documents/{{secretDocId}}
          headers:
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyA}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.secret
                operator: eq
                value: TOP_SECRET_API_KEY_12345

      - name: 'Project A user still exists'
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users/{{userA}}
          headers:
            X-Appwrite-Project: '{{projectA}}'
            X-Appwrite-Key: '{{keyA}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
