name: appwrite-password-edge-cases
description: |
  Probe Appwrite admin password update edge cases. The admin
  PATCH /v1/users/:userId/password endpoint has a fall-through bug:
  when password="" is sent, it sets password to '' and calls
  $response->dynamic() but has no return statement. Execution
  continues to hash the empty string with Argon2 and update the DB
  again. Also tests blocked user password changes and name clearing.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/appwrite-mariadb.yaml
  - $ref: ../shared/appwrite-redis.yaml
  - $ref: ../shared/appwrite-worker-db.yaml
  - $ref: ../shared/appwrite-api.yaml
variables:
  adminEmail: admin@dokkimi.test
  adminPassword: TestPass123!
  projectId: dokkimi-pwd-test
tests:
  - name: Password update edge cases
    steps:
      - name: Register admin account
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            userId: 'unique()'
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
            name: Admin
        extract:
          adminId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create admin session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
        extract:
          fallbackCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create team
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/teams
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            teamId: 'unique()'
            name: Pwd Test Org
        extract:
          teamId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectId}}'
            name: Pwd Test Project
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create API key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectId}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Pwd Test Key
            scopes:
              - users.read
              - users.write
        extract:
          apiKey: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Create user with known password ---

      - name: Create test user
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/users
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            userId: 'unique()'
            email: pwdtest@dokkimi.test
            password: OriginalPass123!
            name: Password Test User
        extract:
          userId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Verify user exists and has password set
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users/{{userId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        extract:
          initialPasswordUpdate: $.response.body.passwordUpdate
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.passwordUpdate
                operator: ne
                value: ''

      # ==========================================
      # PROBE: Update password to empty string
      # users.php lines 1369-1380:
      #   if (\strlen($password) === 0) {
      #     set password to '' in DB
      #     $response->dynamic($user, ...); // NO RETURN
      #   }
      #   // falls through to Argon2 hashing of ''
      #
      # The admin API accepts allowEmpty:true on the
      # password validator. This call should either:
      # - Clear the password (200) — intended behavior
      # - Reject empty password (400) — also acceptable
      # Bug: 200 returned, but the DB gets a second
      # update with Argon2 hash of empty string.
      # ==========================================

      - name: 'PROBE: Update password to empty string'
        stopOnFailure: false
        action:
          type: httpRequest
          method: PATCH
          url: appwrite/v1/users/{{userId}}/password
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            password: ''
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [200, 400, 422]

      - name: Get user after empty password update
        stopOnFailure: false
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users/{{userId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        extract:
          postEmptyPasswordUpdate: $.response.body.passwordUpdate
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      # ==========================================
      # PROBE: Set password back to a real value
      # after the empty string update. If the
      # fall-through stored an Argon2 hash of ''
      # in password history, this might interact
      # with password history checks.
      # ==========================================

      - name: 'PROBE: Set password to new value after empty'
        stopOnFailure: false
        action:
          type: httpRequest
          method: PATCH
          url: appwrite/v1/users/{{userId}}/password
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            password: NewPassword456!
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [200, 400]

      # ==========================================
      # PROBE: Block user, then try to update their
      # password. The admin API should still work
      # on blocked users (it uses API key auth, not
      # user session). But verify the behavior.
      # ==========================================

      - name: Block user
        action:
          type: httpRequest
          method: PATCH
          url: appwrite/v1/users/{{userId}}/status
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            status: false
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.status
                operator: eq
                value: false

      - name: 'PROBE: Update password of blocked user'
        stopOnFailure: false
        action:
          type: httpRequest
          method: PATCH
          url: appwrite/v1/users/{{userId}}/password
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            password: BlockedUserPass789!
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [200, 400, 403]

      # ==========================================
      # PROBE: Create session for blocked user
      # The admin POST /v1/users/:userId/sessions
      # does not check user status. The session will
      # be created but unusable (the API init checks
      # status on session-authenticated requests).
      # ==========================================

      - name: 'PROBE: Create session for blocked user'
        stopOnFailure: false
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/users/{{userId}}/sessions
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [201, 400, 403]

      - name: Unblock user
        stopOnFailure: false
        action:
          type: httpRequest
          method: PATCH
          url: appwrite/v1/users/{{userId}}/status
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            status: true
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      # ==========================================
      # PROBE: Update name to empty string
      # The Text(128, 0) validator accepts empty
      # strings (min length 0). Does Appwrite
      # accept a user with no name?
      # ==========================================

      - name: 'PROBE: Set name to empty string'
        stopOnFailure: false
        action:
          type: httpRequest
          method: PATCH
          url: appwrite/v1/users/{{userId}}/name
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            name: ''
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [200, 400]

      - name: Verify user after name clear
        stopOnFailure: false
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users/{{userId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      # ==========================================
      # PROBE: Set impersonator flag via admin API
      # PATCH /v1/users/:userId/impersonator sets
      # the impersonator flag without any additional
      # checks. A regular project user can be granted
      # impersonation capability. When combined with
      # the x-appwrite-impersonate-user-id header,
      # this user could act as any other user.
      # ==========================================

      - name: 'PROBE: Enable impersonator on regular user'
        stopOnFailure: false
        action:
          type: httpRequest
          method: PATCH
          url: appwrite/v1/users/{{userId}}/impersonator
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            impersonator: true
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [200, 400, 403]

      - name: Verify impersonator flag set
        stopOnFailure: false
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users/{{userId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      # Cleanup
      - name: Delete test user
        stopOnFailure: false
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/users/{{userId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [204, 404]
