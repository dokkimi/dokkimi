name: appwrite-console-log-audit
description: >
  Audit console logs for hidden errors, PHP deprecation warnings, and
  uncaught exceptions. Catches bugs that return 200 but log errors —
  something API-only testing cannot detect.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/appwrite-mariadb.yaml
  - $ref: ../shared/appwrite-redis.yaml
  - $ref: ../shared/appwrite-worker-db.yaml
  - $ref: ../shared/appwrite-api.yaml
variables:
  adminEmail: admin@dokkimi.test
  adminPassword: TestPass123!
  projectId: log-audit
tests:
  - name: Console log audit
    steps:
      # --- Setup ---
      - name: Register admin
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            userId: 'unique()'
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
            name: Admin
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Admin session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
        extract:
          fallbackCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create team
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/teams
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            teamId: 'unique()'
            name: Log Audit Org
        extract:
          teamId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectId}}'
            name: Log Audit Test
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create API key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectId}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Full Key
            scopes:
              - users.read
              - users.write
              - databases.read
              - databases.write
              - collections.read
              - collections.write
              - documents.read
              - documents.write
        extract:
          apiKey: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Exercise typical operations ---

      - name: Create database
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            databaseId: audit-db
            name: Audit DB
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create collection
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/audit-db/collections
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            collectionId: notes
            name: Notes
            permissions:
              - 'read("any")'
              - 'create("any")'
              - 'update("any")'
              - 'delete("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create attribute
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/audit-db/collections/notes/attributes/string
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            key: content
            size: 256
            required: false
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [201, 202]

      - name: Wait for attribute
        repeat:
          count: 15
          as: attempt
          delayMs: 2000
          until:
            - path: $.response.body.status
              operator: eq
              value: available
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/audit-db/collections/notes/attributes/content
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'

      - name: Create document
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/audit-db/collections/notes/documents
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            documentId: 'unique()'
            data:
              content: Audit test document
            permissions:
              - 'read("any")'
              - 'update("any")'
              - 'delete("any")'
        extract:
          docId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Update document
        action:
          type: httpRequest
          method: PATCH
          url: appwrite/v1/databases/audit-db/collections/notes/documents/{{docId}}
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            data:
              content: Updated content
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      - name: Delete document
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/databases/audit-db/collections/notes/documents/{{docId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 204

      - name: Register a user
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
          body:
            userId: 'unique()'
            email: 'user@dokkimi.test'
            password: 'TestPass123!'
            name: Test User
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Let async workers finish processing ---

      - name: Wait for async processing to settle
        action:
          type: wait
          durationMs: 3000

      # --- Audit console logs ---

      - name: Check for PHP fatal errors in API server
        action:
          type: wait
          durationMs: 100
        assertions:
          - match:
              path: $.consoleLogs
              where:
                - path: $$.service
                  operator: eq
                  value: appwrite
                - path: $$.message
                  operator: contains
                  value: 'Fatal error'
              count: 0

      - name: Check for uncaught exceptions in API server
        action:
          type: wait
          durationMs: 100
        assertions:
          - match:
              path: $.consoleLogs
              where:
                - path: $$.service
                  operator: eq
                  value: appwrite
                - path: $$.message
                  operator: contains
                  value: 'Uncaught'
              count: 0

      - name: Check for PHP deprecation warnings
        action:
          type: wait
          durationMs: 100
        assertions:
          - match:
              path: $.consoleLogs
              where:
                - path: $$.service
                  operator: eq
                  value: appwrite
                - path: $$.message
                  operator: contains
                  value: 'Deprecated'
              count: 0

      - name: Check for worker fatal errors
        action:
          type: wait
          durationMs: 100
        assertions:
          - match:
              path: $.consoleLogs
              where:
                - path: $$.service
                  operator: eq
                  value: appwrite-worker-db
                - path: $$.message
                  operator: contains
                  value: 'Fatal error'
              count: 0
