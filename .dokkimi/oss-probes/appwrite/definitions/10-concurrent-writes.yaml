name: appwrite-concurrent-writes
description: >
  Test race conditions using parallel actions. Concurrent writes to the same
  resource should produce consistent state — one succeeds, one fails cleanly.
config:
  timeoutSeconds: 600
items:
  - $ref: ../shared/appwrite-mariadb.yaml
  - $ref: ../shared/appwrite-redis.yaml
  - $ref: ../shared/appwrite-worker-db.yaml
  - $ref: ../shared/appwrite-api.yaml
variables:
  adminEmail: admin@dokkimi.test
  adminPassword: TestPass123!
  projectId: race-test
tests:
  - name: Concurrent write race conditions
    steps:
      # --- Setup ---
      - name: Register admin
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            userId: 'unique()'
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
            name: Admin
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Admin session
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/account/sessions/email
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
          body:
            email: '{{adminEmail}}'
            password: '{{adminPassword}}'
        extract:
          fallbackCookies: $.response.headers.x-fallback-cookies
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create team
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/teams
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            teamId: 'unique()'
            name: Race Test Org
        extract:
          teamId: $.response.body.$id
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create project
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            projectId: '{{projectId}}'
            name: Race Test
            teamId: '{{teamId}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create API key
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/projects/{{projectId}}/keys
          headers:
            Content-Type: application/json
            X-Appwrite-Project: console
            X-Fallback-Cookies: '{{fallbackCookies}}'
          body:
            name: Full Key
            scopes:
              - users.read
              - users.write
              - databases.read
              - databases.write
              - collections.read
              - collections.write
              - documents.read
              - documents.write
        extract:
          apiKey: $.response.body.secret
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create database
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            databaseId: race-db
            name: Race DB
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create collection
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/race-db/collections
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            collectionId: items
            name: Items
            permissions:
              - 'read("any")'
              - 'create("any")'
              - 'update("any")'
              - 'delete("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Create attribute
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/race-db/collections/items/attributes/string
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            key: title
            size: 256
            required: false
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [201, 202]

      - name: Wait for attribute
        repeat:
          count: 15
          as: attempt
          delayMs: 2000
          until:
            - path: $.response.body.status
              operator: eq
              value: available
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/race-db/collections/items/attributes/title
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'

      # --- Race 1: Two documents with the same ID ---

      - name: Concurrent create with same document ID
        action:
          type: parallel
          actions:
            - type: httpRequest
              method: POST
              url: appwrite/v1/databases/race-db/collections/items/documents
              headers:
                Content-Type: application/json
                X-Appwrite-Project: '{{projectId}}'
                X-Appwrite-Key: '{{apiKey}}'
              body:
                documentId: race-doc-1
                data:
                  title: Version A
                permissions:
                  - 'read("any")'
            - type: httpRequest
              method: POST
              url: appwrite/v1/databases/race-db/collections/items/documents
              headers:
                Content-Type: application/json
                X-Appwrite-Project: '{{projectId}}'
                X-Appwrite-Key: '{{apiKey}}'
              body:
                documentId: race-doc-1
                data:
                  title: Version B
                permissions:
                  - 'read("any")'

      - name: Exactly one document exists with that ID
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/race-db/collections/items/documents/race-doc-1
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.title
                operator: in
                value: ['Version A', 'Version B']

      - name: Verify single row in MariaDB
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: "SELECT table_name FROM information_schema.columns WHERE table_schema = 'appwrite' AND column_name = 'title' AND table_name NOT LIKE '_metadata%' LIMIT 1"
        extract:
          docTable: $.response.data[0].table_name
        assertions:
          - assertions:
              - path: $.response.data
                operator: notEmpty

      - name: DB confirms exactly one row with race-doc-1
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: "SELECT COUNT(*) as cnt FROM `{{docTable}}` WHERE _uid LIKE '%race-doc-1%'"
        assertions:
          - assertions:
              - path: $.response.data[0].cnt
                operator: eq
                value: 1

      # --- Race 2: Two users with the same email ---

      - name: Concurrent registration with same email
        action:
          type: parallel
          actions:
            - type: httpRequest
              method: POST
              url: appwrite/v1/account
              headers:
                Content-Type: application/json
                X-Appwrite-Project: '{{projectId}}'
              body:
                userId: 'unique()'
                email: 'race@dokkimi.test'
                password: 'TestPass123!'
                name: Racer A
            - type: httpRequest
              method: POST
              url: appwrite/v1/account
              headers:
                Content-Type: application/json
                X-Appwrite-Project: '{{projectId}}'
              body:
                userId: 'unique()'
                email: 'race@dokkimi.test'
                password: 'TestPass123!'
                name: Racer B

      - name: Only one user with that email exists
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/users
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.total
                operator: eq
                value: 1

      # --- Race 3: Concurrent updates to same document ---

      - name: Create document for update race
        action:
          type: httpRequest
          method: POST
          url: appwrite/v1/databases/race-db/collections/items/documents
          headers:
            Content-Type: application/json
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
          body:
            documentId: update-target
            data:
              title: Original
            permissions:
              - 'read("any")'
              - 'update("any")'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 201

      - name: Concurrent updates to same document
        action:
          type: parallel
          actions:
            - type: httpRequest
              method: PATCH
              url: appwrite/v1/databases/race-db/collections/items/documents/update-target
              headers:
                Content-Type: application/json
                X-Appwrite-Project: '{{projectId}}'
                X-Appwrite-Key: '{{apiKey}}'
              body:
                data:
                  title: Update A
            - type: httpRequest
              method: PATCH
              url: appwrite/v1/databases/race-db/collections/items/documents/update-target
              headers:
                Content-Type: application/json
                X-Appwrite-Project: '{{projectId}}'
                X-Appwrite-Key: '{{apiKey}}'
              body:
                data:
                  title: Update B

      - name: Document has exactly one consistent value
        action:
          type: httpRequest
          method: GET
          url: appwrite/v1/databases/race-db/collections/items/documents/update-target
          headers:
            X-Appwrite-Project: '{{projectId}}'
            X-Appwrite-Key: '{{apiKey}}'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.title
                operator: in
                value: ['Update A', 'Update B']

      - name: MariaDB matches API response
        action:
          type: dbQuery
          database: appwrite-mariadb
          query: "SELECT title FROM `{{docTable}}` WHERE _uid LIKE '%update-target%'"
        assertions:
          - assertions:
              - path: $.response.data
                operator: notEmpty
              - path: $.response.data[0].title
                operator: in
                value: ['Update A', 'Update B']
