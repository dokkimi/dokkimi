type: MOCK
name: mock-k8s-api
description: Mock Kubernetes API server — intercepts CT health checks and namespace operations
mockTarget: kubernetes.default.svc
mockPath: /api/*
mockResponseStatus: 200
mockResponseHeaders:
  Content-Type: application/json
mockResponseBody:
  kind: NamespaceList
  apiVersion: v1
  metadata:
    resourceVersion: '1'
  items: []
