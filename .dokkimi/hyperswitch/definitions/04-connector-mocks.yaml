name: hyperswitch-connector-mocks
description: |
  Mock Stripe's API to test how Hyperswitch handles various connector responses:
  successful payment, amount mismatch, malformed JSON, missing fields, HTML
  error pages, and 500 errors. Probes error handling in the connector layer.
config:
  timeoutSeconds: 180
items:
  - $ref: ../shared/hs-postgres.yaml
  - $ref: ../shared/hs-redis.yaml
  - $ref: ../shared/hs-server.yaml

  # Happy path: successful payment
  - type: MOCK
    name: mock-stripe-success
    mockTarget: api.stripe.com
    mockPath: /v1/payment_intents
    mockMethod: POST
    mockRequestBodyContains: 'pay_success'
    mockResponseStatus: 200
    mockResponseHeaders:
      Content-Type: application/json
    mockResponseBody:
      id: pi_mock_success_123
      object: payment_intent
      amount: 5000
      currency: usd
      status: succeeded
      client_secret: pi_mock_success_123_secret_test
      metadata: {}
      latest_charge:
        id: ch_mock_success_123

  # Amount mismatch: connector returns 9999 when we requested 5000
  - type: MOCK
    name: mock-stripe-amount-mismatch
    mockTarget: api.stripe.com
    mockPath: /v1/payment_intents
    mockMethod: POST
    mockRequestBodyContains: 'pay_mismatch'
    mockResponseStatus: 200
    mockResponseHeaders:
      Content-Type: application/json
    mockResponseBody:
      id: pi_mock_mismatch_456
      object: payment_intent
      amount: 9999
      currency: usd
      status: succeeded
      client_secret: pi_mock_mismatch_456_secret_test
      metadata: {}
      latest_charge:
        id: ch_mock_mismatch_456

  # Malformed JSON
  - type: MOCK
    name: mock-stripe-malformed
    mockTarget: api.stripe.com
    mockPath: /v1/payment_intents
    mockMethod: POST
    mockRequestBodyContains: 'pay_malformed'
    mockResponseStatus: 200
    mockResponseHeaders:
      Content-Type: application/json
    mockResponseBody: '{not valid json at all'

  # Missing required 'id' field
  - type: MOCK
    name: mock-stripe-missing-id
    mockTarget: api.stripe.com
    mockPath: /v1/payment_intents
    mockMethod: POST
    mockRequestBodyContains: 'pay_missing_id'
    mockResponseStatus: 200
    mockResponseHeaders:
      Content-Type: application/json
    mockResponseBody:
      object: payment_intent
      amount: 5000
      currency: usd
      status: succeeded
      metadata: {}

  # HTML error page (CDN 502)
  - type: MOCK
    name: mock-stripe-html-error
    mockTarget: api.stripe.com
    mockPath: /v1/payment_intents
    mockMethod: POST
    mockRequestBodyContains: 'pay_html'
    mockResponseStatus: 502
    mockResponseHeaders:
      Content-Type: text/html
    mockResponseBody: '<html><body><h1>502 Bad Gateway</h1></body></html>'

  # Stripe 500 with valid error JSON
  - type: MOCK
    name: mock-stripe-500
    mockTarget: api.stripe.com
    mockPath: /v1/payment_intents
    mockMethod: POST
    mockRequestBodyContains: 'pay_500'
    mockResponseStatus: 500
    mockResponseHeaders:
      Content-Type: application/json
    mockResponseBody:
      error:
        code: internal_error
        type: api_error
        message: Something went wrong on Stripe's end

  # Customer creation (Hyperswitch creates Stripe customers before payment)
  - type: MOCK
    name: mock-stripe-customers
    mockTarget: api.stripe.com
    mockPath: /v1/customers
    mockMethod: POST
    mockResponseStatus: 200
    mockResponseHeaders:
      Content-Type: application/json
    mockResponseBody:
      id: cus_mock_123
      object: customer
      email: null
      name: Test User

variables:
  adminKey: test_admin
tests:
  - name: Connector error handling
    steps:
      # --- Setup ---
      - name: Create merchant
        action:
          type: httpRequest
          method: POST
          url: hs-server/accounts
          headers:
            Content-Type: application/json
            api-key: '{{adminKey}}'
          body:
            merchant_id: mock-test-merchant
            merchant_name: Mock Test Merchant
            merchant_details:
              primary_contact_person: Test
              primary_email: test@example.com
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
        extract:
          merchantId: $.response.body.merchant_id

      - name: Create API key
        action:
          type: httpRequest
          method: POST
          url: hs-server/api_keys/{{merchantId}}
          headers:
            Content-Type: application/json
            api-key: '{{adminKey}}'
          body:
            name: mock-test-key
            expiration: never
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
        extract:
          apiKey: $.response.body.api_key

      - name: Configure Stripe connector
        action:
          type: httpRequest
          method: POST
          url: hs-server/account/{{merchantId}}/connectors
          headers:
            Content-Type: application/json
            api-key: '{{apiKey}}'
          body:
            connector_type: payment_processor
            connector_name: stripe
            connector_account_details:
              auth_type: HeaderKey
              api_key: sk_test_mock_key
            test_mode: true
            payment_methods_enabled:
              - payment_method: card
                payment_method_types:
                  - payment_method_type: credit
                    card_networks:
                      - Visa
                    minimum_amount: 1
                    maximum_amount: 68607706
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200

      # --- Happy path baseline ---
      - name: 'Successful payment through mocked Stripe'
        action:
          type: httpRequest
          method: POST
          url: hs-server/payments
          headers:
            Content-Type: application/json
            api-key: '{{apiKey}}'
          body:
            amount: 5000
            currency: USD
            confirm: true
            description: pay_success
            payment_method: card
            payment_method_type: credit
            payment_method_data:
              card:
                card_number: '4242424242424242'
                card_exp_month: '12'
                card_exp_year: '2030'
                card_holder_name: Test User
                card_cvc: '123'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.status
                operator: eq
                value: succeeded

      # --- Bug probes (assert expected behavior) ---
      - name: 'FINDING: Amount mismatch caught by integrity check (500 IE_00)'
        action:
          type: httpRequest
          method: POST
          url: hs-server/payments
          headers:
            Content-Type: application/json
            api-key: '{{apiKey}}'
          body:
            amount: 5000
            currency: USD
            confirm: true
            description: pay_mismatch
            payment_method: card
            payment_method_type: credit
            payment_method_data:
              card:
                card_number: '4242424242424242'
                card_exp_month: '12'
                card_exp_year: '2030'
                card_holder_name: Test User
                card_cvc: '123'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 500
              - path: $.response.body.error.code
                operator: eq
                value: IE_00

      - name: 'BUG PROBE: Malformed JSON from connector'
        action:
          type: httpRequest
          method: POST
          url: hs-server/payments
          headers:
            Content-Type: application/json
            api-key: '{{apiKey}}'
          body:
            amount: 5000
            currency: USD
            confirm: true
            description: pay_malformed
            payment_method: card
            payment_method_type: credit
            payment_method_data:
              card:
                card_number: '4242424242424242'
                card_exp_month: '12'
                card_exp_year: '2030'
                card_holder_name: Test User
                card_cvc: '123'
        assertions:
          - assertions:
              - path: $.response.status
                operator: in
                value: [400, 500, 502]

      - name: "Missing 'id' field causes deserialization failure (500 HE_00)"
        action:
          type: httpRequest
          method: POST
          url: hs-server/payments
          headers:
            Content-Type: application/json
            api-key: '{{apiKey}}'
          body:
            amount: 5000
            currency: USD
            confirm: true
            description: pay_missing_id
            payment_method: card
            payment_method_type: credit
            payment_method_data:
              card:
                card_number: '4242424242424242'
                card_exp_month: '12'
                card_exp_year: '2030'
                card_holder_name: Test User
                card_cvc: '123'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 500

      - name: 'FINDING: HTML 502 from connector returns 200 with status=processing'
        action:
          type: httpRequest
          method: POST
          url: hs-server/payments
          headers:
            Content-Type: application/json
            api-key: '{{apiKey}}'
          body:
            amount: 5000
            currency: USD
            confirm: true
            description: pay_html
            payment_method: card
            payment_method_type: credit
            payment_method_data:
              card:
                card_number: '4242424242424242'
                card_exp_month: '12'
                card_exp_year: '2030'
                card_holder_name: Test User
                card_cvc: '123'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.status
                operator: eq
                value: processing

      - name: 'FINDING: Stripe 500 returns 200 with status=processing'
        action:
          type: httpRequest
          method: POST
          url: hs-server/payments
          headers:
            Content-Type: application/json
            api-key: '{{apiKey}}'
          body:
            amount: 5000
            currency: USD
            confirm: true
            description: pay_500
            payment_method: card
            payment_method_type: credit
            payment_method_data:
              card:
                card_number: '4242424242424242'
                card_exp_month: '12'
                card_exp_year: '2030'
                card_holder_name: Test User
                card_cvc: '123'
        assertions:
          - assertions:
              - path: $.response.status
                operator: eq
                value: 200
              - path: $.response.body.status
                operator: eq
                value: processing
