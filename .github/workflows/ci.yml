name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-check:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn format:check

      - name: Validate shared packages
        run: node scripts/validate-shared-packages.js

      - name: Prisma validate
        run: cd shared/prisma && npx prisma validate

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Go format check
        run: test -z "$(gofmt -l services/)"

      - name: Go vet
        run: |
          for dir in services/interceptor services/test-agent services/db-proxy/postgres services/db-proxy/mysql services/db-proxy/mongo services/db-proxy/redis; do
            (cd "$dir" && go vet ./...)
          done

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma client
        run: cd shared/prisma && npx prisma generate

      - name: Build all packages
        run: yarn build

      - name: CLI unit tests
        run: yarn workspace @dokkimi/cli test

      - name: Control Tower unit tests
        run: yarn workspace control-tower test

      - name: Definition validator tests
        run: yarn workspace @dokkimi/definition-validator test

      - name: Definition resolver tests
        run: yarn workspace @dokkimi/definition-resolver test

      - name: Go tests — interceptor
        run: cd services/interceptor && go test ./...

      - name: Go tests — test-agent
        run: cd services/test-agent && go test -vet=off ./...

      - name: Go tests — db-proxy-postgres
        run: cd services/db-proxy/postgres && go test ./...

      - name: Go tests — db-proxy-mysql
        run: cd services/db-proxy/mysql && go test ./...

      - name: Go tests — db-proxy-mongo
        run: cd services/db-proxy/mongo && go test ./...

      - name: Go tests — db-proxy-redis
        run: cd services/db-proxy/redis && go test ./...

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      DOKKIMI_MAX_CONCURRENT_NAMESPACES: 3
      DOKKIMI_MAX_BOOTING_NAMESPACES: 1
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma client
        run: cd shared/prisma && npx prisma generate

      - name: Build all packages
        run: yarn build

      - name: Build Docker images
        run: |
          docker build -t dokkimi/control-tower:latest \
            -f services/control-tower/Dockerfile .

          docker build -t ghcr.io/dokkimi/interceptor:latest \
            -f services/interceptor/Dockerfile services/interceptor

          docker build -t ghcr.io/dokkimi/test-agent:latest \
            -f services/test-agent/Dockerfile services/test-agent

          for db in postgres mysql mongo redis; do
            docker build -t ghcr.io/dokkimi/db-proxy-${db}:latest \
              -f services/db-proxy/${db}/Dockerfile services/db-proxy
          done

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/powershell
          docker builder prune -af
          df -h /

      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--docker --disable=traefik --write-kubeconfig-mode=644" sh -
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          until kubectl get nodes | grep -q ' Ready'; do sleep 2; done
          echo "KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> $GITHUB_ENV
          # Use the node's internal IP — pods in k3s can reach this but not docker0 bridge
          NODE_IP=$(kubectl get node -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          echo "CONTROL_TOWER_HOST=$NODE_IP" >> $GITHUB_ENV
          echo "Host IP for CT: $NODE_IP"

      - name: Pull external images
        run: |
          docker pull busybox:1.37
          docker pull fluent/fluent-bit:3.2
          docker pull andyshinn/dnsmasq:2.83
          docker pull ghcr.io/dokkimi/demo-spa:0.3.1
          docker pull ghcr.io/dokkimi/nextjs-demo:0.1.0
          docker pull ghcr.io/dokkimi/traffic-tester:0.1.0
          docker pull ghcr.io/dokkimi/demo-oauth-flow:0.1.0

      - name: Run demo-oauth-flow tests
        timeout-minutes: 10
        run: node apps/cli/dist/bin/dokkimi.js run .dokkimi/demo-oauth-flow --ci

      - name: Run demo-nextjs tests
        timeout-minutes: 10
        run: node apps/cli/dist/bin/dokkimi.js run .dokkimi/demo-nextjs --ci

      - name: Run control-tower tests
        timeout-minutes: 10
        run: node apps/cli/dist/bin/dokkimi.js run .dokkimi/control-tower --ci

      - name: Run traffic-tester tests
        timeout-minutes: 10
        run: node apps/cli/dist/bin/dokkimi.js run .dokkimi/traffic-tester --ci

      - name: Run demo-spa tests
        timeout-minutes: 10
        run: node apps/cli/dist/bin/dokkimi.js run .dokkimi/demo-spa --ci

      - name: Cleanup
        if: always()
        run: |
          node apps/cli/dist/bin/dokkimi.js clean 2>/dev/null || true
          /usr/local/bin/k3s-uninstall.sh || true
