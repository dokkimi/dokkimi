name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-check:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn format:check

      - name: Validate shared packages
        run: node scripts/validate-shared-packages.js

      - name: Prisma validate
        run: cd shared/prisma && npx prisma validate

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: |
            services/interceptor/go.sum
            services/test-agent/go.sum
            services/db-proxy/postgres/go.sum
            services/broker-proxy/amqp/go.sum

      - name: Go format check
        run: test -z "$(gofmt -l services/)"

      - name: Go vet
        run: |
          for dir in services/interceptor services/test-agent services/db-proxy/postgres services/db-proxy/mysql services/db-proxy/mongo services/db-proxy/redis services/broker-proxy/amqp; do
            (cd "$dir" && go vet ./...)
          done

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: |
            services/interceptor/go.sum
            services/test-agent/go.sum
            services/db-proxy/postgres/go.sum
            services/broker-proxy/amqp/go.sum

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma client
        run: cd shared/prisma && npx prisma generate

      - name: Build all packages
        run: yarn build

      - name: Config tests
        run: yarn workspace @dokkimi/config test

      - name: CLI unit tests
        run: yarn workspace @dokkimi/cli test

      - name: Control Tower unit tests
        run: yarn workspace control-tower test

      - name: Definition validator tests
        run: yarn workspace @dokkimi/definition-validator test

      - name: Definition resolver tests
        run: yarn workspace @dokkimi/definition-resolver test

      - name: Go tests — interceptor
        run: cd services/interceptor && go test ./...

      - name: Go tests — test-agent
        run: cd services/test-agent && go test -vet=off ./...

      - name: Go tests — db-proxy-postgres
        run: cd services/db-proxy/postgres && go test ./...

      - name: Go tests — db-proxy-mysql
        run: cd services/db-proxy/mysql && go test ./...

      - name: Go tests — db-proxy-mongo
        run: cd services/db-proxy/mongo && go test ./...

      - name: Go tests — db-proxy-redis
        run: cd services/db-proxy/redis && go test ./...

      - name: Go tests — broker-proxy-amqp
        run: cd services/broker-proxy/amqp && go test ./...

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      CONTROL_TOWER_HOST: 0.0.0.0
      DOKKIMI_MAX_CONCURRENT_NAMESPACES: 4
      DOKKIMI_MAX_BOOTING_NAMESPACES: 2
    steps:
      - uses: actions/checkout@v5

      - name: Post in-progress comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number }}
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="<!-- dokkimi-test-results -->
          ### :hourglass_flowing_sand: Dokkimi Test Results

          Tests are running... [View progress](${RUN_URL})"
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" --jq '.[] | select(.body | contains("<!-- dokkimi-test-results -->")) | .id' | tail -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"
          else
            echo "$BODY" | gh pr comment "$PR" --body-file -
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma client
        run: cd shared/prisma && npx prisma generate

      - name: Build all packages
        run: yarn build

      - name: Build Docker images
        run: |
          docker build -t dokkimi/control-tower:latest \
            -f services/control-tower/Dockerfile . &
          docker build -t ghcr.io/dokkimi/interceptor:latest \
            -f services/interceptor/Dockerfile services/interceptor &
          docker build -t ghcr.io/dokkimi/test-agent:latest \
            -f services/test-agent/Dockerfile services/test-agent &
          for db in postgres mysql mongo redis; do
            docker build -t ghcr.io/dokkimi/db-proxy-${db}:latest \
              -f services/db-proxy/${db}/Dockerfile services/db-proxy &
          done
          docker build -t ghcr.io/dokkimi/broker-proxy-amqp:latest \
            -f services/broker-proxy/amqp/Dockerfile services/broker-proxy &
          wait

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/powershell
          docker builder prune -af
          df -h /

      - name: Pull external images
        run: |
          docker pull andyshinn/dnsmasq:2.83
          docker pull ghcr.io/dokkimi/demo-spa:0.3.1
          docker pull ghcr.io/dokkimi/nextjs-demo:0.1.0
          docker pull ghcr.io/dokkimi/traffic-tester:0.1.0
          docker pull ghcr.io/dokkimi/demo-oauth-flow:0.1.0

      - name: Run demo-oauth-flow tests
        timeout-minutes: 10
        run: node apps/cli/dist/bin/dokkimi.js run .dokkimi/demo-oauth-flow --ci --junit junit-reports/demo-oauth-flow.xml

      - name: Run demo-nextjs tests
        timeout-minutes: 10
        run: node apps/cli/dist/bin/dokkimi.js run .dokkimi/demo-nextjs --ci --junit junit-reports/demo-nextjs.xml

      - name: Run control-tower tests
        timeout-minutes: 10
        run: node apps/cli/dist/bin/dokkimi.js run .dokkimi/control-tower --ci --junit junit-reports/control-tower.xml

      - name: Run traffic-tester tests
        timeout-minutes: 10
        run: node apps/cli/dist/bin/dokkimi.js run .dokkimi/traffic-tester --ci --junit junit-reports/traffic-tester.xml

      - name: Run demo-spa tests
        timeout-minutes: 10
        run: node apps/cli/dist/bin/dokkimi.js run .dokkimi/demo-spa --ci --junit junit-reports/demo-spa.xml

      - name: Upload JUnit reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: dokkimi-junit-reports
          path: junit-reports/
          if-no-files-found: ignore

      - name: Test report
        if: always()
        run: |
          node apps/cli/dist/bin/dokkimi.js junit --summary --dir junit-reports >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number }}
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SUMMARY=$(node apps/cli/dist/bin/dokkimi.js junit --summary --dir junit-reports)
          BODY=$(printf '%s\n\n[View full output](%s)' "$SUMMARY" "$RUN_URL")
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" --jq '.[] | select(.body | contains("<!-- dokkimi-test-results -->")) | .id' | tail -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" -X PATCH -f body="$BODY"
          else
            echo "$BODY" | gh pr comment "$PR" --body-file -
          fi

      - name: Dump failed results
        if: failure()
        run: |
          node apps/cli/dist/bin/dokkimi.js dump --failed || true
          found=$(find "$HOME/.dokkimi/runs" -name dump_failed.json -type f 2>/dev/null | sort | tail -1)
          [ -n "$found" ] && cp "$found" /tmp/dokkimi-dump.json || echo "no dump file found" > /tmp/dokkimi-dump.json

      - name: Upload dump artifact
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: dokkimi-failed-dump
          path: /tmp/dokkimi-dump.json
          retention-days: 1

      - name: Cleanup
        if: always()
        run: node apps/cli/dist/bin/dokkimi.js clean 2>/dev/null || true
