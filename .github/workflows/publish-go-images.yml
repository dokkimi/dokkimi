name: Publish Go Service Images

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/dokkimi

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: interceptor
            context: services/interceptor
            dockerfile: services/interceptor/Dockerfile
            image: interceptor
          - service: test-agent
            context: services/test-agent
            dockerfile: services/test-agent/Dockerfile
            image: test-agent
          - service: db-proxy-postgres
            context: services/db-proxy
            dockerfile: services/db-proxy/postgres/Dockerfile
            image: db-proxy-postgres
          - service: db-proxy-mysql
            context: services/db-proxy
            dockerfile: services/db-proxy/mysql/Dockerfile
            image: db-proxy-mysql
          - service: db-proxy-mongo
            context: services/db-proxy
            dockerfile: services/db-proxy/mongo/Dockerfile
            image: db-proxy-mongo
          - service: db-proxy-redis
            context: services/db-proxy
            dockerfile: services/db-proxy/redis/Dockerfile
            image: db-proxy-redis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
